<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagebreak</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    /* ── Editorial palette ── */
    --bg-canvas:      #edeae2;
    --editor-bg:      #faf9f7;
    --ink:            #1c1b18;
    --ink-mid:        #6b6860;
    --ink-dim:        #a8a49c;
    --ink-faint:      rgba(0,0,0,0.07);
    --accent:         #c2692a;
    --accent-light:   #e8874a;
    --accent-dim:     rgba(194,105,42,0.1);
    --panel-bg:       rgba(250,248,244,0.82);
    --panel-border:   rgba(0,0,0,0.08);
    --glass-bg:       rgba(255,255,255,0.65);
    --glass-border:   rgba(255,255,255,0.8);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.95) inset, 0 8px 32px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06), inset 0 0 0 1.5px rgba(255,255,255,0.6);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.9) inset, 0 2px 8px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --blur:           blur(18px) saturate(1.6);
    --delete-bg:      rgba(184,74,74,0.15);
    --delete-color:   #b84a4a;
  }

  .dark {
    --bg-canvas:      #18160f;
    --editor-bg:      #141412;
    --ink:            #e8e4db;
    --ink-mid:        #968f84;
    --ink-dim:        #4a4740;
    --ink-faint:      rgba(255,255,255,0.06);
    --panel-bg:       rgba(24,22,16,0.85);
    --panel-border:   rgba(255,255,255,0.07);
    --glass-bg:       rgba(38,35,28,0.62);
    --glass-border:   rgba(255,255,255,0.1);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 32px rgba(0,0,0,0.32), 0 1px 2px rgba(0,0,0,0.2), inset 0 0 0 1.5px rgba(255,255,255,0.08);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.05) inset, 0 2px 8px rgba(0,0,0,0.28), 0 1px 2px rgba(0,0,0,0.16);
    --blur:           blur(20px) saturate(1.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg-canvas);
    transition: background 0.4s;
  }

  input, button { font-family: inherit; }

  body::before {
    content: '';
    pointer-events: none;
    position: fixed; inset: 0; z-index: 0; opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ── Chrome ── */
  .chrome {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; gap: 12px;
    background: transparent;
    z-index: 200;
  }
  .chrome-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chrome-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

  .brand { display: flex; align-items: center; flex-shrink: 0; }
  .brand img { height: 42px; width: auto; display: block; }
  .dark .brand img { filter: invert(1); }

  .post-title-inline {
    font-size: 16px;
    color: var(--ink-dim); background: none; border: none; outline: none;
    width: 220px; max-width: 30vw;
    transition: color 0.2s;
  }
  .post-title-inline::placeholder { color: var(--ink-dim); }
  .post-title-inline:focus { color: var(--ink-mid); }

  /* ── Word count + target widget ── */
  .word-count-wrap {
    display: flex; align-items: center; gap: 5px;
  }
  .word-count {
    font-size: 16px; font-weight: 400; color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .target-toggle-btn {
    width: 22px; height: 22px;
    border: 1px solid var(--glass-border); border-radius: 6px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-dim);
    transition: background 0.15s, color 0.15s, box-shadow 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .target-toggle-btn:hover {
    background: rgba(255,255,255,0.72);
    box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 4px 14px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.5);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .target-toggle-btn:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 4px 14px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .target-toggle-btn.has-target { color: var(--ink-mid); }
  .target-toggle-btn svg { width: 10px; height: 10px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

  /* ── Word target popover ── */
  .target-popover {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    z-index: 500;
  }
  .target-popover.show {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  .target-popover-label {
    font-size: 13px; font-weight: 500; color: var(--ink-mid);
    letter-spacing: -0.01em;
  }
  .target-input {
    font-size: 14px; font-weight: 500; color: var(--ink);
    font-variant-numeric: tabular-nums; width: 80px;
    background: var(--ink-faint); border: 1px solid var(--panel-border);
    outline: none; border-radius: 7px; padding: 4px 8px;
    text-align: center;
  }
  .target-input:focus { border-color: var(--accent); }
  .target-set-btn {
    font-size: 13px; font-weight: 600; color: #fff;
    background: var(--accent); border: none; border-radius: 7px;
    padding: 4px 11px; cursor: pointer; letter-spacing: -0.01em;
    transition: background 0.15s, transform 0.1s;
  }
  .target-set-btn:hover { background: var(--accent-light); transform: translateY(-1px); }

  .word-target-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    border-radius: 0 1px 1px 0;
  }
  .word-target-progress.done { background: linear-gradient(90deg, #4a9e6a, #6ec48a); }

  .icon-btn {
    width: 50px; height: 50px; border-radius: 50%;
    border: 1px solid var(--glass-border); 
    background: var(--glass-bg);
    box-shadow: var(--glass-shadow);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-mid);
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
    flex-shrink: 0;
    font-size: 18px;
  }
  .icon-btn:hover {
    background: rgba(255,255,255,0.72);
    box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 10px 40px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08), inset 0 0 0 1.5px rgba(255,255,255,0.6);
    color: var(--ink);
    transform: translateY(-2px);
  }
  .dark .icon-btn:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 32px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3), inset 0 0 0 1.5px rgba(255,255,255,0.12);
  }
  .icon-btn.on {
    background: var(--ink); color: var(--bg-canvas);
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.22);
  }
  .icon-btn--sm { width: 40px; height: 40px; font-size: 18px; }

  .copy-btn {
    font-size: 14px; font-weight: 500;
    padding: 0 13px; height: 50px;
    border: 1px solid var(--glass-border); border-radius: 25px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow);
    cursor: pointer; color: var(--ink-mid);
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.72);
    box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 10px 40px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08), inset 0 0 0 1.5px rgba(255,255,255,0.6);
    color: var(--ink);
    transform: translateY(-2px);
  }
  .dark .copy-btn:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 32px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3), inset 0 0 0 1.5px rgba(255,255,255,0.12);
  }
  .copy-btn svg { width: 14px; height: 14px; stroke: currentColor; flex-shrink: 0; }

  .menu-wrapper { position: relative; }

  .menu-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 10px;
    min-width: 160px;
    z-index: 500;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }

  .menu-dropdown.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  .menu-item {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 12px 14px; border: none;
    background: none; cursor: pointer; color: var(--ink-mid);
    font-size: 14px; font-weight: 500; text-align: left;
    transition: background 0.1s, color 0.1s; letter-spacing: -0.01em;
  }

  .menu-item:hover { background: var(--ink-faint); color: var(--ink); }
  .menu-item:active { background: var(--accent-dim); color: var(--accent); }
  .menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .menu-item span:last-child { flex: 1; }
  .menu-divider { height: 1px; background: var(--panel-border); margin: 4px 0; }

  /* Help modal */
  .help-modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.4); z-index: 600;
    opacity: 0; transition: opacity 0.3s;
  }

  .help-modal-backdrop.show { display: block; opacity: 1; }

  .help-modal {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
    border-radius: 16px; width: 90%; max-width: 600px; max-height: 80vh;
    overflow-y: auto; z-index: 601; opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    scrollbar-width: thin; scrollbar-color: var(--ink-faint) transparent;
  }

  .help-modal::-webkit-scrollbar { width: 6px; }
  .help-modal::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 3px; }
  .help-modal.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

  .help-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--panel-border);
    position: sticky; top: 0; background: var(--glass-bg); z-index: 1;
  }

  .help-modal-title { font-size: 18px; font-weight: 600; color: var(--ink); margin: 0; letter-spacing: -0.01em; }

  .help-modal-close {
    width: 32px; height: 32px; border: 1px solid var(--glass-border);
    border-radius: 8px; background: none; cursor: pointer;
    color: var(--ink-mid); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  .help-modal-close:hover { background: var(--ink-faint); color: var(--ink); }
  .help-modal-content { padding: 24px; }
  .help-section { margin-bottom: 28px; }
  .help-section:last-child { margin-bottom: 0; }
  .help-section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    color: var(--ink-dim); letter-spacing: 0.1em; margin: 0 0 14px 0;
  }

  .help-shortcut { display: flex; align-items: center; gap: 14px; padding: 10px 0; font-size: 14px; line-height: 1.5; }

  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; padding: 0 8px;
    background: var(--ink-faint); border: 1px solid var(--panel-border);
    border-radius: 6px; font-family: 'Courier New', monospace;
    font-size: 12px; font-weight: 600; color: var(--ink-mid); white-space: nowrap;
  }

  .help-desc { color: var(--ink-mid); flex: 1; }
  .help-feature { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; border-bottom: 1px solid var(--panel-border); }
  .help-feature:last-child { border-bottom: none; }
  .help-feature-name { font-weight: 600; color: var(--ink); font-size: 14px; }
  .help-feature .help-desc { font-size: 13px; }

  .save-status { font-size: 14px; color: var(--accent); opacity: 0; transition: opacity 0.4s; white-space: nowrap; letter-spacing: 0.01em; }
  .save-status.show { opacity: 1; }

  /* ── Layout ── */
  .writing-area { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; overflow: hidden; }

  .editor-wrap {
    flex: 1; overflow-y: auto; padding: 116px 0 120px;
    background: var(--editor-bg); transition: background 0.4s;
    scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.12) transparent;
  }
  .editor-wrap::-webkit-scrollbar { width: 3px; }
  .editor-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .editor-inner { max-width: 640px; margin: 0 auto; padding: 0 36px; }

  .editor {
    font-family: 'Lora', serif; font-size: 18px; line-height: 1.9;
    color: var(--ink); caret-color: var(--accent); outline: none;
    min-height: calc(100vh - 200px); transition: color 0.3s;
    letter-spacing: 0.005em; overflow-wrap: break-word; word-break: normal;
  }
  .editor:empty::before { content: attr(data-placeholder); color: var(--ink-dim); font-style: italic; pointer-events: none; }

  .editor p, .editor div { margin-top: 1.15em; }
  .editor ul { padding-left: 1.4em; margin-top: 1.15em; list-style: disc; }
  .editor ul li { margin-bottom: 0.2em; line-height: 1.9; }
  .editor ul ul { margin-top: 0; list-style: circle; }
  .editor ul ul ul { list-style: square; }
  .editor strong { font-weight: 700; }
  .editor em { font-style: italic; }

  .editor h1, .editor h2, .editor h3 {
    font-family: 'Lora', serif; font-weight: 600; color: var(--ink);
    line-height: 1.3; margin-top: 1.15em; margin-bottom: 0.5em; letter-spacing: -0.02em;
  }
  .editor h1 { font-size: 2em; }
  .editor h2 { font-size: 1.5em; }
  .editor h3 { font-size: 1.2em; }

  /* ── Celebration pill ── */
  .celebration {
    position: fixed; top: 78px; left: 50%; transform: translateX(-50%) translateY(-12px);
    background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); color: var(--ink); font-size: 13px; font-weight: 500;
    padding: 8px 20px; border-radius: 24px; opacity: 0; pointer-events: none; z-index: 300;
    transition: opacity 0.3s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; letter-spacing: -0.01em;
  }
  .celebration.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; font-size: 12px; font-weight: 500; color: var(--ink-mid);
    background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 10px; padding: 7px 14px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(6px); pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Posts sidebar ── */
  .posts-panel {
    position: fixed; top: 64px; left: 0; bottom: 0; width: 220px;
    border-right: 1px solid var(--panel-border); background: var(--panel-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    display: flex; flex-direction: column; overflow: hidden; z-index: 150;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s, border-color 0.4s;
  }
  .posts-panel.hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; border-right-width: 0; }

  .posts-panel-header { padding: 16px 14px 12px; flex-shrink: 0; border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between; }
  .posts-panel-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); }
  .posts-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 3px; scrollbar-width: thin; scrollbar-color: var(--ink-faint) transparent; }
  .posts-list::-webkit-scrollbar { width: 2px; }
  .posts-list::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

  .post-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 9px; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; }
  .post-row:hover { background: rgba(255,255,255,0.55); box-shadow: var(--glass-shadow-sm); }
  .dark .post-row:hover { background: rgba(255,255,255,0.05); }
  .post-row.active { background: var(--accent-dim); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset; }
  .post-row-info { flex: 1; min-width: 0; }
  .post-row-title { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; line-height: 1.3; }
  .post-row.active .post-row-title { color: var(--accent); }
  .post-row-meta { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .post-row-delete {
    width: 20px; height: 20px; border-radius: 5px; border: none; background: none; cursor: pointer;
    color: var(--ink-dim); font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: background 0.15s, color 0.15s, opacity 0.15s; flex-shrink: 0;
  }
  .post-row:hover .post-row-delete { opacity: 1; }
  .post-row-delete:hover { background: var(--delete-bg); color: var(--delete-color); }

  .post-row-confirm-title { font-size: 12px; font-weight: 500; color: var(--delete-color); line-height: 1.3; }
  .post-row-confirm-meta { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .post-row-confirm-yes { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; border: none; cursor: pointer; flex-shrink: 0; background: var(--delete-bg); color: var(--delete-color); }
  .post-row-confirm-no { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; border: none; cursor: pointer; flex-shrink: 0; background: var(--ink-faint); color: var(--ink-mid); }

  .posts-panel-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 149; opacity: 0; transition: opacity 0.3s; }
  .posts-panel-backdrop.show { opacity: 1; }

  @media (max-width: 700px) {
    .chrome { padding: 0 14px; gap: 8px; }
    .chrome-left { gap: 8px; flex: 1; min-width: 0; }
    .chrome-right { gap: 8px; flex-shrink: 0; }
    .post-title-inline { display: none; }
    .copy-btn { display: none; }
    .brand img { height: 34px; }
    .editor-inner { padding: 0 20px; }
    .posts-panel { top: auto; bottom: 0; left: 0; right: 0; width: 100%; height: 62vh; max-height: 520px; border-right: none; border-top: 1px solid var(--panel-border); border-radius: 20px 20px 0 0; transform: translateY(100%); opacity: 1; }
    .posts-panel.hidden { transform: translateY(100%); opacity: 1; pointer-events: none; border-top-width: 0; }
    .posts-panel.mobile-open { transform: translateY(0) !important; opacity: 1 !important; pointer-events: auto !important; border-top-width: 1px !important; }
    .posts-panel-backdrop { display: block; }
    .posts-panel-header::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 36px; height: 4px; background: var(--ink-dim); border-radius: 2px; opacity: 0.35; }
    .posts-panel-header { position: relative; padding-top: 22px; }
    .post-row-delete { opacity: 1; }
  }

  /* ── Slash menu ── */
  .slash-menu {
    position: fixed; background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 10px; padding: 4px; min-width: 160px; z-index: 400;
    opacity: 0; transform: translateY(4px); pointer-events: none; transition: opacity 0.15s, transform 0.15s cubic-bezier(0.4,0,0.2,1);
  }
  .slash-menu.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .slash-menu-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: background 0.1s; user-select: none; }
  .slash-menu-item:hover, .slash-menu-item.active { background: var(--ink-faint); }
  .slash-menu-item-icon {
    width: 28px; height: 28px; border-radius: 6px; background: var(--glass-bg); border: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Lora', serif; color: var(--ink-mid); font-weight: 600;
  }
  .slash-menu-item-icon.icon-h { font-size: 14px; }
  .slash-menu-item-icon.icon-p { font-size: 10px; }
  .slash-menu-item-label { font-size: 13px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
  .slash-menu-item-desc  { font-size: 11px; color: var(--ink-dim); margin-top: 1px; }

  /* ── Compare mode ── */
  #paneA          { display: contents; }
  #paneB          { display: none; }
  #compareDivider { display: none; }

  .writing-area.compare-mode { flex-direction: row; }
  .writing-area.compare-mode #paneA { display: flex; flex: 1; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }
  .writing-area.compare-mode #paneA .editor-wrap { flex: 1; }
  .writing-area.compare-mode #compareDivider { display: block; width: 1px; flex-shrink: 0; background: var(--panel-border); align-self: stretch; margin-top: 64px; }
  .writing-area.compare-mode #paneB { display: flex; flex: 1; flex-direction: column; overflow: hidden; position: relative; min-width: 0; opacity: 0; transform: translateX(18px); transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.4,0,0.2,1); }
  .writing-area.compare-mode #paneB.visible { opacity: 1; transform: translateX(0); }
  .writing-area.compare-mode #paneB .editor-wrap { flex: 1; }

  #paneALabel, #paneAFooter { display: none; }

  .compare-label {
    position: absolute; top: 72px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim);
    background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 20px; pointer-events: none; z-index: 10; white-space: nowrap;
  }

  .pane-footer { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
  .pane-word-count { font-size: 13px; font-weight: 400; color: var(--ink-dim); font-variant-numeric: tabular-nums; background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 3px 12px; }

  .word-count-wrap.compare-mode-active { display: none; }
</style>
</head>
<body>

<div class="chrome">
  <div class="chrome-left">
    <button class="icon-btn" id="btnPosts" title="All posts" aria-label="Toggle posts panel">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
        <path d="M2 3h10a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
        <path d="M4 6h6M4 9h6M4 12h4" opacity="0.6"/>
      </svg>
    </button>
    <div class="brand">
      <img src="https://raw.githubusercontent.com/wavebreakr/pagebreak/main/PagebreakLogo2.png" alt="Pagebreak">
    </div>
    <input class="post-title-inline" id="postTitleInline" type="text" placeholder="Untitled post…" maxlength="80" aria-label="Post title">
  </div>
  <div class="chrome-right">
    <span class="save-status" id="saveStatus" aria-live="polite">Saved</span>
    <div class="word-count-wrap" id="wordCountWrap" style="position:relative;">
      <span class="word-count" id="wordCount" aria-live="polite">0 words</span>
      <button class="target-toggle-btn" id="targetToggleBtn" title="Set word count target" aria-label="Set word count target">
        <svg id="targetToggleIcon" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <line x1="5" y1="1" x2="5" y2="9"/>
          <line x1="1" y1="5" x2="9" y2="5"/>
        </svg>
      </button>
      <div class="target-popover" id="targetPopover">
        <span class="target-popover-label">Target</span>
        <input class="target-input" id="targetInput" type="number" min="1" max="99999" placeholder="e.g. 500" aria-label="Word target — press Enter to set, Escape to cancel">
        <button class="target-set-btn" id="targetSetBtn">Set</button>
      </div>
    </div>
    <div class="menu-wrapper">
      <button class="icon-btn" id="btnMenu" title="More options" aria-label="More options">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" width="14" height="14" aria-hidden="true">
          <line x1="2" y1="3" x2="14" y2="3"/>
          <line x1="2" y1="8" x2="14" y2="8"/>
          <line x1="2" y1="13" x2="14" y2="13"/>
        </svg>
      </button>
      <div class="menu-dropdown" id="menuDropdown" role="menu">
        <button class="menu-item" id="btnCopy" role="menuitem" title="Copy all text to clipboard">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
            <rect x="5" y="4" width="9" height="11" rx="1.5"/>
            <path d="M11 4V3a1 1 0 0 0-1-1H3a1.5 1.5 0 0 0-1.5 1.5v8A1 1 0 0 0 3 12.5h2"/>
          </svg>
          <span>Copy</span>
        </button>
        <button class="menu-item" id="btnCompare" role="menuitem" title="Toggle compare mode">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
            <line x1="8" y1="2" x2="8" y2="14"/>
            <rect x="1" y="4" width="5" height="8" rx="1"/>
            <rect x="10" y="4" width="5" height="8" rx="1"/>
          </svg>
          <span>Compare</span>
        </button>
        <button class="menu-item" id="btnDark" role="menuitem" title="Toggle dark mode">
          <span id="darkIcon" aria-hidden="true">🌙</span>
          <span>Dark mode</span>
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item" id="btnHelp" role="menuitem" title="Keyboard shortcuts and tips">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
            <circle cx="8" cy="8" r="7"/>
            <path d="M8 5.5a1.5 1.5 0 0 0-1.5 1.5c0 1 1.5 1.5 1.5 3"/>
            <circle cx="8" cy="12.5" r="0.5" fill="currentColor"/>
          </svg>
          <span>Keyboard shortcuts</span>
        </button>
      </div>
    </div>
  </div>
  <div class="word-target-progress" id="wordTargetProgress" role="progressbar" aria-hidden="true"></div>
</div>

<div class="writing-area" id="writingArea">
  <div class="posts-panel-backdrop" id="postsPanelBackdrop"></div>
  <div class="posts-panel hidden" id="postsPanel">
    <div class="posts-panel-header">
      <span class="posts-panel-label">Posts</span>
      <button class="icon-btn icon-btn--sm" id="btnNewPost" title="New post" aria-label="New post">＋</button>
    </div>
    <div class="posts-list" id="postsList" role="list"></div>
  </div>

  <div id="paneA">
    <div class="compare-label" id="paneALabel">Original</div>
    <div class="pane-footer" id="paneAFooter">
      <span class="pane-word-count" id="paneACount">0 words</span>
    </div>
    <div class="editor-wrap" id="editorWrap">
      <div class="editor-inner">
        <div class="editor" id="editor" contenteditable="true" data-placeholder="Start writing…" spellcheck="true" role="textbox" aria-multiline="true" aria-label="Editor"></div>
      </div>
    </div>
  </div>

  <div id="compareDivider" aria-hidden="true"></div>

  <div id="paneB">
    <div class="compare-label">Compare</div>
    <div class="editor-wrap">
      <div class="editor-inner">
        <div class="editor" id="editorB" contenteditable="true" data-placeholder="Paste or type copy to compare…" spellcheck="true" role="textbox" aria-multiline="true" aria-label="Compare editor"></div>
      </div>
    </div>
    <div class="pane-footer">
      <span class="pane-word-count" id="paneBCount">0 words</span>
    </div>
  </div>
</div>

</body>
</html>
