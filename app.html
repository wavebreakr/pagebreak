<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagebreak</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Theme: Paper (default) ── */
    --bg-canvas:      #edeae2;
    --editor-bg:      #faf9f7;
    --ink:            #1c1b18;
    --ink-mid:        #6b6860;
    --ink-dim:        #a8a49c;
    --ink-faint:      rgba(0,0,0,0.07);
    --accent:         #c2692a;
    --accent-light:   #e8874a;
    --accent-dim:     rgba(194,105,42,0.1);
    --panel-bg:       rgba(250,248,244,0.82);
    --panel-border:   rgba(0,0,0,0.08);
    --glass-bg:       rgba(255,255,255,0.58);
    --glass-border:   rgba(255,255,255,0.75);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.9) inset, 0 8px 32px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 8px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --blur:           blur(18px) saturate(1.6);
  }

  .dark {
    --bg-canvas:      #18160f;
    --editor-bg:      #141412;
    --ink:            #e8e4db;
    --ink-mid:        #968f84;
    --ink-dim:        #4a4740;
    --ink-faint:      rgba(255,255,255,0.06);
    --panel-bg:       rgba(24,22,16,0.85);
    --panel-border:   rgba(255,255,255,0.07);
    --glass-bg:       rgba(38,35,28,0.62);
    --glass-border:   rgba(255,255,255,0.1);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 32px rgba(0,0,0,0.32), 0 1px 2px rgba(0,0,0,0.2);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.05) inset, 0 2px 8px rgba(0,0,0,0.28), 0 1px 2px rgba(0,0,0,0.16);
    --blur:           blur(20px) saturate(1.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg-canvas);
    transition: background 0.4s;
  }

  /* Noise grain overlay */
  body::before {
    content: '';
    pointer-events: none;
    position: fixed; inset: 0; z-index: 0; opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ── Chrome ── */
  .chrome {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; gap: 12px;
    background: transparent;
    z-index: 200;
  }
  .chrome-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chrome-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

  .brand { display: flex; align-items: center; flex-shrink: 0; }
  .brand img { height: 42px; width: auto; display: block; }
  .dark .brand img { filter: invert(1); }

  .post-title-inline {
    font-size: 16px;
    color: var(--ink-dim); background: none; border: none; outline: none;
    width: 220px; max-width: 30vw;
    transition: color 0.2s;
  }
  .post-title-inline::placeholder { color: var(--ink-dim); }
  .post-title-inline:focus { color: var(--ink-mid); }

  /* ── Word count + target widget ── */
  .word-count-wrap {
    display: flex; align-items: center; gap: 5px;
  }
  .word-count {
    font-size: 16px; font-weight: 400; color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  /* Small icon button for adding/clearing target */
  .target-toggle-btn {
    width: 22px; height: 22px;
    border: 1px solid var(--glass-border); border-radius: 6px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-dim);
    transition: background 0.15s, color 0.15s, box-shadow 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .target-toggle-btn:hover {
    background: rgba(255,255,255,0.82);
    box-shadow: 0 1px 0 #fff inset, 0 4px 14px rgba(0,0,0,0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .target-toggle-btn:hover { background: rgba(255,255,255,0.1); }
  .target-toggle-btn.has-target { color: var(--ink-mid); }
  .target-toggle-btn svg { width: 10px; height: 10px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

  /* ── Word target popover ── */
  .target-popover {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    z-index: 500;
  }
  .target-popover.show {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  .target-popover-label {
    font-size: 13px; font-weight: 500; color: var(--ink-mid);
    letter-spacing: -0.01em;
  }
  .target-input {
    font-size: 14px; font-weight: 500; color: var(--ink);
    font-variant-numeric: tabular-nums; width: 80px;
    background: var(--ink-faint); border: 1px solid var(--panel-border);
    outline: none; border-radius: 7px; padding: 4px 8px;
    text-align: center;
  }
  .target-input:focus { border-color: var(--accent); }
  .target-set-btn {
    font-size: 13px; font-weight: 600; color: #fff;
    background: var(--accent); border: none; border-radius: 7px;
    padding: 4px 11px; cursor: pointer; letter-spacing: -0.01em;
    transition: background 0.15s, transform 0.1s;
  }
  .target-set-btn:hover { background: var(--accent-light); transform: translateY(-1px); }

  .word-target-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    border-radius: 0 1px 1px 0;
  }
  .word-target-progress.done { background: linear-gradient(90deg, #4a9e6a, #6ec48a); }

  /* Glass icon button */
  .icon-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--glass-border); border-radius: 9px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink-mid);
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
  }
  .icon-btn:hover {
    background: rgba(255,255,255,0.82);
    box-shadow: 0 1px 0 #fff inset, 0 4px 14px rgba(0,0,0,0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .icon-btn:hover { background: rgba(255,255,255,0.1); }
  .icon-btn.on {
    background: var(--ink); color: var(--bg-canvas);
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.22);
  }
  /* Small variant used for the new-post button in the sidebar header */
  .icon-btn--sm { width: 24px; height: 24px; font-size: 16px; border-radius: 5px; }

  /* Glass text button */
  .copy-btn {
    font-size: 14px; font-weight: 500;
    padding: 0 13px; height: 34px;
    border: 1px solid var(--glass-border); border-radius: 8px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer; color: var(--ink-mid);
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.82);
    box-shadow: 0 1px 0 #fff inset, 0 4px 14px rgba(0,0,0,0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .copy-btn:hover { background: rgba(255,255,255,0.1); }
  .copy-btn svg { width: 12px; height: 12px; stroke: currentColor; flex-shrink: 0; }

  .save-status {
    font-size: 14px; color: var(--accent);
    opacity: 0; transition: opacity 0.4s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .save-status.show { opacity: 1; }

  /* ── Scroll top fade ── */
  .scroll-top-fade {
    position: fixed; top: 0; left: 0; right: 0;
    height: 100px;
    background: linear-gradient(to bottom, var(--editor-bg) 0%, var(--editor-bg) 64px, transparent 104px);
    pointer-events: none; z-index: 50;
    transition: background 0.4s;
  }

  /* ── Layout ── */
  .writing-area {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; overflow: hidden;
  }

  .editor-wrap {
    flex: 1; overflow-y: auto; padding: 116px 0 120px;
    background: var(--editor-bg);
    transition: background 0.4s;
    /* Standard Firefox scrollbar styling */
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,0.12) transparent;
  }
  .editor-wrap::-webkit-scrollbar { width: 3px; }
  .editor-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .editor-inner { max-width: 640px; margin: 0 auto; padding: 0 36px; }

  /* ── Editor ──
     min-height accounts for: 48px chrome + 52px top padding + ~100px breathing room */
  .editor {
    font-family: 'Lora', serif;
    font-size: 18px; line-height: 1.9;
    color: var(--ink); caret-color: var(--accent);
    outline: none; min-height: calc(100vh - 200px);
    transition: color 0.3s;
    letter-spacing: 0.005em;
    /* break-word is a legacy alias; overflow-wrap is the standard equivalent */
    overflow-wrap: break-word;
    word-break: normal;
  }
  .editor:empty::before {
    content: attr(data-placeholder);
    color: var(--ink-dim); font-style: italic; pointer-events: none;
  }

  /* Uniform paragraph spacing — editor-wrap top padding provides the top breathing room */
  .editor p,
  .editor div { margin-top: 1.15em; }

  .editor ul { padding-left: 1.4em; margin-top: 1.15em; list-style: disc; }
  .editor ul li { margin-bottom: 0.2em; line-height: 1.9; }
  .editor ul ul { margin-top: 0; list-style: circle; }
  .editor ul ul ul { list-style: square; }

  .editor strong { font-weight: 700; }
  .editor em { font-style: italic; }

  .editor h1, .editor h2, .editor h3 {
    font-family: 'Lora', serif; font-weight: 600; color: var(--ink);
    line-height: 1.3; margin-top: 1.15em; margin-bottom: 0.5em;
    letter-spacing: -0.02em;
  }
  .editor h1 { font-size: 2em; }
  .editor h2 { font-size: 1.5em; }
  .editor h3 { font-size: 1.2em; }

  /* ── Celebration pill ── */
  .celebration {
    position: fixed; top: 78px; left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
    color: var(--ink); font-size: 13px; font-weight: 500;
    padding: 8px 20px; border-radius: 24px;
    opacity: 0; pointer-events: none; z-index: 300;
    transition: opacity 0.3s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; letter-spacing: -0.01em;
  }
  .celebration.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    font-size: 12px; font-weight: 500; color: var(--ink-mid);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
    border-radius: 10px; padding: 7px 14px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    transform: translateY(6px); pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Posts sidebar ──
     Fixed overlay anchored below the chrome bar; the editor content
     stays put and the toggle button never moves. */
  .posts-panel {
    position: fixed; top: 64px; left: 0; bottom: 0;
    width: 220px;
    border-right: 1px solid var(--panel-border);
    background: var(--panel-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 150;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s, border-color 0.4s;
  }
  .posts-panel.hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; border-right-width: 0; }

  .posts-panel-header {
    padding: 16px 14px 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .posts-panel-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-dim);
  }
  .posts-list {
    flex: 1; overflow-y: auto;
    padding: 8px; display: flex; flex-direction: column; gap: 3px;
    scrollbar-width: thin;
    scrollbar-color: var(--ink-faint) transparent;
  }
  .posts-list::-webkit-scrollbar { width: 2px; }
  .posts-list::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

  .post-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .post-row:hover { background: rgba(255,255,255,0.55); box-shadow: var(--glass-shadow-sm); }
  .dark .post-row:hover { background: rgba(255,255,255,0.05); }
  .post-row.active { background: var(--accent-dim); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset; }
  .post-row-info { flex: 1; min-width: 0; }
  .post-row-title {
    font-size: 14px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em; line-height: 1.3;
  }
  .post-row.active .post-row-title { color: var(--accent); }
  .post-row-meta { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .post-row-delete {
    width: 20px; height: 20px; border-radius: 5px;
    border: none; background: none; cursor: pointer;
    color: var(--ink-dim); font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: background 0.15s, color 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .post-row:hover .post-row-delete { opacity: 1; }
  .post-row-delete:hover { background: rgba(184,74,74,0.12); color: #b84a4a; }

  /* ── Mobile bottom sheet backdrop ── */
  .posts-panel-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.28);
    z-index: 149;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .posts-panel-backdrop.show { opacity: 1; }

  @media (max-width: 700px) {
    /* Chrome: compact single row */
    .chrome { padding: 0 14px; gap: 8px; }
    .chrome-left { gap: 8px; flex: 1; min-width: 0; }
    .chrome-right { gap: 8px; flex-shrink: 0; }

    /* Hide title input and copy button on mobile — focus on the editor */
    .post-title-inline { display: none; }
    .copy-btn { display: none; }

    /* Logo slightly smaller */
    .brand img { height: 34px; }

    /* Editor padding */
    .editor-inner { padding: 0 20px; }

    /* Posts panel: bottom sheet instead of left sidebar */
    .posts-panel {
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 62vh;
      max-height: 520px;
      border-right: none;
      border-top: 1px solid var(--panel-border);
      border-radius: 20px 20px 0 0;
      /* Hidden state: slide down off-screen */
      transform: translateY(100%);
      opacity: 1;
      /* Override the hidden class transform so our sheet animation works */
    }
    .posts-panel.hidden {
      transform: translateY(100%);
      opacity: 1; /* keep it rendered but slid away */
      pointer-events: none;
      border-top-width: 0;
    }
    /* When open on mobile, slide up */
    .posts-panel.mobile-open {
      transform: translateY(0) !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      border-top-width: 1px !important;
    }

    /* Backdrop visible on mobile */
    .posts-panel-backdrop { display: block; }

    /* Panel header drag handle */
    .posts-panel-header::before {
      content: '';
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 4px;
      background: var(--ink-dim);
      border-radius: 2px;
      opacity: 0.35;
    }
    .posts-panel-header { position: relative; padding-top: 22px; }

    /* Delete buttons always visible on touch */
    .post-row-delete { opacity: 1; }
  }

  /* ── Slash menu ── */
  .slash-menu {
    position: fixed;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 10px;
    padding: 4px;
    min-width: 160px;
    z-index: 400;
    opacity: 0;
    transform: translateY(4px);
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.4,0,0.2,1);
  }
  .slash-menu.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .slash-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .slash-menu-item:hover,
  .slash-menu-item.active {
    background: var(--ink-faint);
  }
  .slash-menu-item-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--glass-bg);
    border: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Lora', serif;
    color: var(--ink-mid);
    font-weight: 600;
  }
  .slash-menu-item-icon.icon-h { font-size: 14px; }
  .slash-menu-item-icon.icon-p { font-size: 10px; }
  .slash-menu-item-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .slash-menu-item-desc {
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 1px;
  }

  /* ── Compare mode ──
     Default state: #paneA is an unstyled wrapper (display:contents makes
     it invisible to layout — children behave as direct children of
     writing-area, exactly matching pagebreak-7). #paneB and the divider
     are display:none so they have zero layout impact. */

  #paneA          { display: contents; }
  #paneB          { display: none; }
  #compareDivider { display: none; }

  /* Compare active */
  .writing-area.compare-mode { flex-direction: row; }

  .writing-area.compare-mode #paneA {
    display: flex; flex: 1; flex-direction: column;
    overflow: hidden; position: relative; min-width: 0;
  }
  .writing-area.compare-mode #paneA .editor-wrap { flex: 1; }

  .writing-area.compare-mode #compareDivider {
    display: block; width: 1px; flex-shrink: 0;
    background: var(--panel-border);
    align-self: stretch; margin-top: 64px;
  }

  .writing-area.compare-mode #paneB {
    display: flex; flex: 1; flex-direction: column;
    overflow: hidden; position: relative; min-width: 0;
    opacity: 0; transform: translateX(18px);
    transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .writing-area.compare-mode #paneB.visible {
    opacity: 1; transform: translateX(0);
  }
  .writing-area.compare-mode #paneB .editor-wrap { flex: 1; }

  /* Hide compare overlays that live inside paneA when not in compare mode */
  #paneALabel, #paneAFooter { display: none; }

  /* Pane label pill */
  .compare-label {
    position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-dim);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    padding: 3px 10px; border-radius: 20px;
    pointer-events: none; z-index: 10; white-space: nowrap;
  }

  /* Per-pane word count footer */
  .pane-footer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  .pane-word-count {
    font-size: 13px; font-weight: 400; color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 3px 12px;
  }

  /* In compare mode hide the chrome word count */
  .word-count-wrap.compare-mode-active { display: none; }

  /* Per-pane scroll fade */
  .compare-pane-fade {
    position: absolute; top: 0; left: 0; right: 0; height: 100px;
    background: linear-gradient(to bottom, var(--editor-bg) 0%, var(--editor-bg) 64px, transparent 104px);
    pointer-events: none; z-index: 5; transition: background 0.4s;
  }

  @media (max-width: 700px) {
    .writing-area.compare-mode { flex-direction: column; }
    .writing-area.compare-mode #compareDivider {
      width: auto; height: 1px; margin-top: 0;
    }
  }
</style>
</head>
<body>

<div class="chrome">

    <button class="icon-btn" id="btnPosts" title="All posts" aria-label="Toggle posts panel" onclick="togglePostsPanel()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
        <line x1="2" y1="4" x2="14" y2="4"/>

  </div>
  <div class="chrome-right">
    <span class="save-status" id="saveStatus" aria-live="polite">Saved</span>
    <div class="word-count-wrap" style="position:relative;">

      <button class="target-toggle-btn" id="targetToggleBtn"
        title="Set word count target"
        aria-label="Set word count target"

        <svg id="targetToggleIcon" viewBox="0 0 10 10" fill="none" aria-hidden="true">

    </div>
    <button class="copy-btn" title="Copy all text to clipboard" aria-label="Copy to clipboard" onclick="copyText()">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="5" y="4" width="9" height="11" rx="1.5"/>
        <path d="M11 4V3a1 1 0 0 0-1-1H3a1.5 1.5 0 0 0-1.5 1.5v8A1 1 0 0 0 3 12.5h2"/>

      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">

  <!-- Pane A wrapper — invisible in default mode (no styles applied to #paneA outside compare) -->

          contenteditable="true"

  <!-- Compare pane — hidden until compare mode -->

      <div class="editor-inner">
        <div class="editor" id="editorB"
          contenteditable="true"
          data-placeholder="Paste or type copy to compare…"
          spellcheck="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Compare editor"></div>
      </div>
    </div>

      <span class="pane-word-count" id="paneBCount">0 words</span>
    </div>
  </div>
</div>

<div class="celebration" id="celebration" aria-live="polite" aria-atomic="true"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="slash-menu" id="slashMenu" role="listbox" aria-label="Insert block type">
  <div class="slash-menu-item" data-index="0" role="option"
    onmousedown="event.preventDefault(); slashSelect(0)">
    <div class="slash-menu-item-icon icon-h">H</div>
    <div>
      <div class="slash-menu-item-label">Header</div>
      <div class="slash-menu-item-desc">Section heading</div>
    </div>
  </div>
  <div class="slash-menu-item" data-index="1" role="option"
    onmousedown="event.preventDefault(); slashSelect(1)">
    <div class="slash-menu-item-icon icon-p">¶</div>
    <div>
      <div class="slash-menu-item-label">Paragraph</div>
      <div class="slash-menu-item-desc">Plain body text</div>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────
let wordTarget       = 0;
let targetCelebrated = false;
let isComposing      = false; // IME composition guard
let isTyping         = false; // typewriter scroll guard — only scroll on keystrokes, not clicks
let _typingTimer     = null;
let compareMode      = false; // compare pane active

// Autosave timer — module-level so both onType and onTitleType share it
let _saveTimer = null;

// Slash menu state
let slashMenuOpen    = false;
let slashMenuIndex   = 0;  // 0 = Header, 1 = Paragraph
let slashBlock       = null; // the block element that holds the "/" trigger
let slashBareLine    = null; // bare text node when "/" is on the first unwrapped line

// Cached element references — populated once in DOMContentLoaded
let elEditor, elEditorWrap, elPostsPanel, elWordCount,
    elTargetInput, elSaveStatus, elProgressBar, elCelebration, elToast,
    elPostTitle, elPostsList, elBtnDark, elBtnPosts, elSlashMenu,
    elBtnCompare, elWritingArea, elPaneB, elEditorB;

// Block tag sets used in DOM-walking hot paths
const BLOCK_TAGS = new Set(['P', 'DIV', 'LI', 'BR', 'H1', 'H2', 'H3', 'UL', 'OL']);
// PARA_RE: paragraph-like blocks only (list detection, slash-menu trigger)
const PARA_RE    = /^(P|DIV|LI)$/;

// ── Init ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  elEditor        = document.getElementById('editor');
  elEditorWrap    = document.getElementById('editorWrap');
  elPostsPanel    = document.getElementById('postsPanel');
  elWordCount     = document.getElementById('wordCount');
  elTargetInput   = document.getElementById('targetInput');
  elSaveStatus    = document.getElementById('saveStatus');
  elProgressBar   = document.getElementById('wordTargetProgress');
  elCelebration   = document.getElementById('celebration');
  elToast         = document.getElementById('toast');
  elPostTitle     = document.getElementById('postTitleInline');
  elPostsList     = document.getElementById('postsList');
  elBtnDark       = document.getElementById('btnDark');
  elBtnPosts      = document.getElementById('btnPosts');
  elSlashMenu     = document.getElementById('slashMenu');
  elBtnCompare    = document.getElementById('btnCompare');
  elWritingArea   = document.getElementById('writingArea');
  elPaneB         = document.getElementById('paneB');
  elEditorB       = document.getElementById('editorB');

  // defaultParagraphSeparator must be set before any content is loaded
  // NOTE: execCommand is deprecated but remains the only viable API for
  // contenteditable editing at this level without a full editor framework.
  document.execCommand('defaultParagraphSeparator', false, 'p');

  loadDoc();

  // Autosave every 20s as a backstop for the 5s debounce
  setInterval(silentSave, 20000);

  // Save on tab close/refresh — localStorage.setItem is synchronous so this works
  window.addEventListener('beforeunload', silentSave);

  // Cmd/Ctrl+S
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); silentSave(); }
  });

  // Close slash menu on outside click
  document.addEventListener('mousedown', e => {
    if (slashMenuOpen && !elSlashMenu.contains(e.target)) closeSlashMenu();
  });

  elEditor.addEventListener('keydown', onEditorKeydown);
  elEditor.addEventListener('input', onEditorInput);

  // Track IME composition to avoid false triggers on CJK input
  elEditor.addEventListener('compositionstart', () => { isComposing = true; });
  elEditor.addEventListener('compositionend',   () => { isComposing = false; });

  // Plain-text paste only
  elEditor.addEventListener('paste', e => {
    e.preventDefault();
    document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
  });

  // Compare pane: same paste behaviour, live word count
  elEditorB.addEventListener('paste', e => {
    e.preventDefault();
    document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
  });
  elEditorB.addEventListener('input', updateComparePaneCount);

  // Word target popover: keyboard and outside-click handling
  elTargetInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commitTarget(); }
    if (e.key === 'Escape') { e.preventDefault(); closeTargetInput(); }
  });
  document.addEventListener('mousedown', e => {
    const popover = document.getElementById('targetPopover');
    if (popover && popover.classList.contains('show') && !popover.contains(e.target)) {
      closeTargetInput();
    }
  }, true);
});


// Keeps the cursor at ~50% of the visible editor height while typing.
// Only fires during keyboard input (isTyping guard) to avoid disrupting
// click-to-reposition behaviour.
function scrollToCursor() {
  if (!isTyping) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  if (!rect.height) return; // no valid cursor position
  const wrapRect = elEditorWrap.getBoundingClientRect();
  const target   = wrapRect.top + wrapRect.height * 0.5;
  const delta    = rect.top - target;
  // Dead zone of 4px prevents micro-jitter when cursor is already near centre
  if (Math.abs(delta) > 4) elEditorWrap.scrollTop += delta;
}

// ── Editor keydown handler ─────────────────────────────
function onEditorKeydown(e) {
  // Mark as keyboard-driven for typewriter scroll; clear after 1s of inactivity
  isTyping = true;
  clearTimeout(_typingTimer);
  _typingTimer = setTimeout(() => { isTyping = false; }, 1000);

  const mod = e.metaKey || e.ctrlKey;

  // Slash menu navigation
  if (slashMenuOpen) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); setSlashIndex((slashMenuIndex + 1) % 2); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); setSlashIndex((slashMenuIndex + 1) % 2); return; }
    if (e.key === 'Enter')      { e.preventDefault(); slashSelect(slashMenuIndex); return; }
    if (e.key === 'Escape')     { e.preventDefault(); closeSlashMenu(true); return; }
    // Any other non-navigation key dismisses the menu and types normally
    if (e.key !== 'Shift' && e.key !== 'Meta' && e.key !== 'Control' && e.key !== 'Alt') {
      closeSlashMenu();
    }
  }

  // Bold / Italic
  if (mod && e.key === 'b') { e.preventDefault(); document.execCommand('bold');   return; }
  if (mod && e.key === 'i') { e.preventDefault(); document.execCommand('italic'); return; }

  // Tab — indent/outdent in lists, otherwise insert spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== elEditor) {
        if (node.nodeName === 'LI') {
          document.execCommand(e.shiftKey ? 'outdent' : 'indent');
          return;
        }
        node = node.parentNode;
      }
    }
    document.execCommand('insertText', false, '    ');
    return;
  }

  const sel = window.getSelection();

  // Space — "- " → unordered list
  if (e.key === ' ') {
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return;
    let block = range.startContainer;
    while (block && block !== elEditor && !PARA_RE.test(block.nodeName)) {
      block = block.parentNode;
    }
    if (!block || block === elEditor) return;
    const pre = document.createRange();
    pre.setStart(block, 0);
    pre.setEnd(range.startContainer, range.startOffset);
    if (pre.toString() === '-') {
      e.preventDefault();
      const del = document.createRange();
      del.setStart(range.startContainer, range.startOffset - 1);
      del.setEnd(range.startContainer, range.startOffset);
      sel.removeAllRanges(); sel.addRange(del);
      document.execCommand('delete');
      document.execCommand('insertUnorderedList');
      onType(); return;
    }
    return;
  }
}

// ── Editor input handler ───────────────────────────────
function onEditorInput() {
  // Check if we should open the slash menu
  if (!slashMenuOpen) maybeOpenSlashMenu();
  onType();
  requestAnimationFrame(scrollToCursor);
}

// ── Slash menu ─────────────────────────────────────────
// Opens the slash menu if the current block contains only "/"
function maybeOpenSlashMenu() {
  if (isComposing) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed) return;

  // Walk up to find the enclosing block (P/DIV/LI), or detect a bare text
  // node sitting directly inside the editor (first-line edge case)
  let block = range.startContainer;
  while (block && block !== elEditor && !PARA_RE.test(block.nodeName)) {
    block = block.parentNode;
  }
  if (!block) return;

  // If we landed on the editor itself, the cursor is in a bare text node —
  // use the text node's parent (elEditor) as the block anchor
  const isBareLine = (block === elEditor);

  // Only trigger when the visible text is exactly "/"
  const textContent = isBareLine
    ? range.startContainer.textContent
    : block.textContent;
  if (textContent !== '/') return;

  slashBlock   = block;
  slashBareLine = isBareLine ? range.startContainer : null;
  openSlashMenu(range);
}

function openSlashMenu(range) {
  slashMenuIndex = 0;
  updateSlashMenuItems();
  // Position below the cursor
  const rect = range.getBoundingClientRect();
  elSlashMenu.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  elSlashMenu.style.top  = (rect.bottom + 6) + 'px';
  elSlashMenu.classList.add('visible');
  slashMenuOpen = true;
}

function closeSlashMenu(restoreFocus) {
  slashMenuOpen = false;
  slashBlock    = null;
  slashBareLine = null;
  elSlashMenu.classList.remove('visible');
  if (restoreFocus) elEditor.focus();
}

function setSlashIndex(i) {
  slashMenuIndex = i;
  updateSlashMenuItems();
}

function updateSlashMenuItems() {
  elSlashMenu.querySelectorAll('.slash-menu-item').forEach((el, i) => {
    el.classList.toggle('active', i === slashMenuIndex);
  });
}

// Called when user confirms a selection (mousedown on item or Enter key)
// index 0 = Header (h2), index 1 = Paragraph (p)
function slashSelect(index) {
  const block    = slashBlock;
  const bareLine = slashBareLine;
  closeSlashMenu();

  const tag   = index === 0 ? 'h2' : 'p';
  const newEl = document.createElement(tag);
  newEl.appendChild(document.createElement('br'));

  if (bareLine) {
    // First-line bare text node: replace it (and only it) with the new element
    elEditor.replaceChild(newEl, bareLine);
  } else {
    if (!block || !block.isConnected) return;
    block.parentNode.replaceChild(newEl, block);
  }

  // Place cursor at the start of the new element
  const sel = window.getSelection();
  const r   = document.createRange();
  r.setStart(newEl, 0);
  r.collapse(true);
  sel.removeAllRanges();
  sel.addRange(r);

  onType();
}


// ── Word count + target ────────────────────────────────
function onType() {
  updateWordCount();
  if (compareMode) updatePaneACount();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(silentSave, 5000);
}

// Walk the editor tree and collect text. sep=' ' for word-counting (blocks
// get whitespace boundaries), sep='\n' for copy (blocks become line breaks).
function walkEditorText(sep) {
  const parts = [];
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      parts.push(node.textContent);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      const isBlock = BLOCK_TAGS.has(node.tagName);
      if (isBlock) parts.push(sep);
      for (const child of node.childNodes) walk(child);
      if (isBlock) parts.push(sep);
    }
  }
  walk(elEditor);
  return parts.join('');
}


function updateWordCount() {
  const rawText = walkEditorText(' ');
  const trimmed = rawText.trim();
  const words   = trimmed ? trimmed.split(/\s+/).length : 0;
  elWordCount.textContent = wordTarget
    ? `${words} / ${wordTarget} word${wordTarget !== 1 ? 's' : ''}`
    : `${words} word${words !== 1 ? 's' : ''}`;
  updateTargetProgress(words);
  if (wordTarget > 0 && words === wordTarget && !targetCelebrated) {
    targetCelebrated = true;
    celebrate(`${words} words — target reached! ✦`);
  }
  // Reset flag when below target; also lock it when above (so overshooting
  // doesn't re-fire the celebration on the way back down through the target)
  if (wordTarget > 0 && words < wordTarget) targetCelebrated = false;
  if (wordTarget > 0 && words > wordTarget) targetCelebrated = true;
}

// Toggle button click: if target already set, clear it immediately;
// otherwise open the input to set one.
function onTargetToggle() {
  if (wordTarget > 0) {
    clearTarget();
  } else {
    openTargetInput();
  }
}

function openTargetInput() {
  const popover = document.getElementById('targetPopover');
  elTargetInput.value = wordTarget || '';
  popover.classList.add('show');
  elTargetInput.focus();
  elTargetInput.select();
}

function commitTarget() {
  const val = parseInt(elTargetInput.value, 10);
  wordTarget = val > 0 ? val : 0;
  targetCelebrated = false;
  if (wordTarget) {
    localStorage.setItem('pb_target', wordTarget);
  } else {
    localStorage.removeItem('pb_target');
  }
  closeTargetInput();
  updateWordCount();
  updateTargetToggleBtn();
}

function clearTarget() {
  wordTarget = 0;
  targetCelebrated = false;
  localStorage.removeItem('pb_target');
  closeTargetInput();
  updateWordCount();
  updateTargetToggleBtn();
}

function closeTargetInput() {
  document.getElementById('targetPopover').classList.remove('show');
}

// Swap the toggle button icon between + (no target) and × (target active)
function updateTargetToggleBtn() {
  const btn  = document.getElementById('targetToggleBtn');
  const icon = document.getElementById('targetToggleIcon');
  if (!btn || !icon) return;
  if (wordTarget > 0) {
    btn.classList.add('has-target');
    btn.title = 'Clear word target';
    btn.setAttribute('aria-label', 'Clear word target');
    // Render as × (times/close)
    icon.innerHTML = '<line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/>';
  } else {
    btn.classList.remove('has-target');
    btn.title = 'Set word count target';
    btn.setAttribute('aria-label', 'Set word count target');
    icon.innerHTML = '<line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/>';
  }
}

function updateTargetProgress(words) {
  if (!wordTarget) { elProgressBar.style.width = '0'; return; }
  elProgressBar.style.width = Math.min(words / wordTarget * 100, 100) + '%';
  elProgressBar.classList.toggle('done', words >= wordTarget);
}

function celebrate(msg) {
  elCelebration.textContent = msg;
  elCelebration.classList.add('show');
  clearTimeout(celebrate._t);
  celebrate._t = setTimeout(() => elCelebration.classList.remove('show'), 2600);
}

function onTitleType() {
  const title = elPostTitle.value.trim();
  document.title = title ? title + ' — Pagebreak' : 'Pagebreak';
  const panelVisible = !elPostsPanel.classList.contains('hidden') || elPostsPanel.classList.contains('mobile-open');
  if (panelVisible) renderPostsList();
  // Schedule save — title changes don't affect word count
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(silentSave, 5000);
}

// ── Posts management ───────────────────────────────────
function genId() {
  return 'pb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}
function getAllPostIds() {
  try { return JSON.parse(localStorage.getItem('pb_posts') || '[]'); } catch { return []; }
}
function saveAllPostIds(ids) { localStorage.setItem('pb_posts', JSON.stringify(ids)); }
function getActiveId()       { return localStorage.getItem('pb_active') || null; }
function setActiveId(id)     { localStorage.setItem('pb_active', id); }
function getPost(id) {
  // localStorage.getItem returns null for missing keys; JSON.parse(null) === null (no error).
  // The try/catch only fires on malformed JSON.
  try { return JSON.parse(localStorage.getItem(id)); } catch { return null; }
}
function savePost(id, data)  { localStorage.setItem(id, JSON.stringify(data)); }
function deletePost(id) {
  localStorage.removeItem(id);
  saveAllPostIds(getAllPostIds().filter(i => i !== id));
}
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function togglePostsPanel() {
  const isMobile  = window.innerWidth <= 700;
  const isHidden  = isMobile
    ? !elPostsPanel.classList.contains('mobile-open')
    : elPostsPanel.classList.contains('hidden');

  if (isHidden) { silentSave(); renderPostsList(); }

  if (isMobile) {
    const backdrop = document.getElementById('postsPanelBackdrop');
    if (isHidden) {
      elPostsPanel.classList.remove('hidden');
      // rAF so the browser paints the unhidden state before we add the class
      requestAnimationFrame(() => {
        elPostsPanel.classList.add('mobile-open');
        backdrop.classList.add('show');
      });
    } else {
      elPostsPanel.classList.remove('mobile-open');
      backdrop.classList.remove('show');
      // Re-add hidden after transition so it doesn't intercept touches
      setTimeout(() => elPostsPanel.classList.add('hidden'), 350);
    }
  } else {
    elPostsPanel.classList.toggle('hidden', !isHidden);
  }
  elBtnPosts.classList.toggle('on', isHidden);
}

function renderPostsList() {
  const ids      = getAllPostIds();
  const activeId = getActiveId();
  if (!ids.length) {
    elPostsList.innerHTML = '<div style="font-size:14px;color:var(--ink-dim);padding:8px 2px;">No posts yet.</div>';
    return;
  }
  elPostsList.innerHTML = [...ids].reverse().map(id => {
    const post = getPost(id);
    if (!post) return '';
    const title = post.title || 'Untitled post';
    // Strip HTML tags to count words; regex is safe here because content
    // has already passed through sanitizeBody
    const words = post.body
      ? post.body.replace(/<[^>]+>/g, ' ').split(/\s+/).filter(Boolean).length
      : 0;
    // Use navigator.language for locale-appropriate date formatting
    const date = post.saved
      ? new Date(post.saved).toLocaleDateString(navigator.language, { day: 'numeric', month: 'short' })
      : '';
    return `
      <div class="post-row${id === activeId ? ' active' : ''}" data-post-id="${id}"
        role="listitem" onclick="openPost('${id}')">
        <div class="post-row-info">
          <div class="post-row-title">${escHtml(title)}</div>
          <div class="post-row-meta">${words} word${words !== 1 ? 's' : ''} · ${date}</div>
        </div>
        <button class="post-row-delete"
          aria-label="Delete ${escHtml(title)}"
          onclick="event.stopPropagation();confirmDeletePost('${id}')">×</button>
      </div>`;
  }).join('');
}

// Shared helper — populates editor and chrome title from saved post data
function setEditorContent(body, title) {
  const t = (title || '').trim();
  elPostTitle.value  = title || '';
  elEditor.innerHTML = sanitizeBody(body || '');
  document.title     = t ? t + ' — Pagebreak' : 'Pagebreak';
  targetCelebrated   = false;
  updateWordCount();
}

function openPost(id) {
  silentSave();
  setActiveId(id);
  const post = getPost(id);
  if (post) setEditorContent(post.body, post.title);
  renderPostsList();
  // Close the panel on mobile after selection
  if (window.innerWidth <= 700 && elPostsPanel.classList.contains('mobile-open')) {
    togglePostsPanel();
  }
  elEditor.focus();
}

function newPost() {
  silentSave();
  const id = genId();
  try {
    saveAllPostIds([...getAllPostIds(), id]);
    savePost(id, { title: '', body: '', saved: Date.now() });
  } catch {
    showSaveStatus('⚠ Save failed', true); return;
  }
  setActiveId(id);
  setEditorContent('', '');
  renderPostsList();
  // Close the panel on mobile after creating a post
  if (window.innerWidth <= 700 && elPostsPanel.classList.contains('mobile-open')) {
    togglePostsPanel();
  }
  elEditor.focus();
}

function confirmDeletePost(id) {
  // Scope the query to the posts list, not the whole document
  const row = elPostsList.querySelector(`.post-row[data-post-id="${id}"]`);
  if (!row) return;
  const name = getPost(id)?.title || 'Untitled post';
  row.innerHTML = `
    <div class="post-row-info" style="min-width:0">
      <div class="post-row-title" style="color:#b84a4a;font-size:12px">Delete "${escHtml(name)}"?</div>
      <div class="post-row-meta">This can't be undone</div>
    </div>
    <button onclick="event.stopPropagation();doDeletePost('${id}')"
      style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:rgba(184,74,74,0.15);color:#b84a4a;cursor:pointer;flex-shrink:0;">Yes</button>
    <button onclick="event.stopPropagation();renderPostsList()"
      style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:var(--ink-faint);color:var(--ink-mid);cursor:pointer;flex-shrink:0;">No</button>
  `;
}

function doDeletePost(id) {
  // Save current work before any deletion, including when deleting a different post
  silentSave();
  const activeId = getActiveId();
  deletePost(id);
  if (id === activeId) {
    const ids = getAllPostIds();
    ids.length ? openPost(ids[ids.length - 1]) : newPost();
    return;
  }
  renderPostsList();
}

// ── Dark mode ──────────────────────────────────────────
function setDark(on) {
  document.body.classList.toggle('dark', on);
  // The emoji is aria-hidden; the button's aria-label is the accessible name
  elBtnDark.querySelector('span').textContent = on ? '☀️' : '🌙';
  elBtnDark.classList.toggle('on', on);
}

function toggleDark() {
  const on = !document.body.classList.contains('dark');
  setDark(on);
  localStorage.setItem('pb_dark', on);
}

// ── Save / Load ────────────────────────────────────────

// Strip inline color/background injected by Chromium's contenteditable so
// saved HTML defers to CSS variables correctly in light and dark mode.
function sanitizeBody(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty('color');
    el.style.removeProperty('background-color');
    el.style.removeProperty('background');
    // getAttribute can return null if a prior removeProperty already cleared it
    const remaining = el.getAttribute('style') || '';
    if (!remaining.trim()) el.removeAttribute('style');
  });
  return tmp.innerHTML;
}

function silentSave() {
  let id = getActiveId();
  try {
    if (!id) {
      id = genId();
      saveAllPostIds([...getAllPostIds(), id]);
      setActiveId(id);
    }
    savePost(id, {
      title: elPostTitle.value,
      body:  sanitizeBody(elEditor.innerHTML),
      saved: Date.now(),
    });
    showSaveStatus('Saved');
    // Only re-render the list if the panel is open — inside try so we only
    // update the UI after confirming the save succeeded
    if (!elPostsPanel.classList.contains('hidden')) renderPostsList();
  } catch {
    showSaveStatus('⚠ Save failed', true);
  }
}

function showSaveStatus(msg, isError = false) {
  elSaveStatus.textContent = msg;
  elSaveStatus.style.color = isError ? '#b84a4a' : '';
  elSaveStatus.classList.add('show');
  clearTimeout(showSaveStatus._t);
  showSaveStatus._t = setTimeout(() => elSaveStatus.classList.remove('show'), isError ? 4000 : 2000);
}

function loadDoc() {
  try {
    const ids = getAllPostIds();

    // Migrate legacy single-doc save (pb_v4) into the multi-post system
    const legacy = localStorage.getItem('pb_v4');
    if (legacy && !ids.length) {
      const d  = JSON.parse(legacy);
      const id = genId();
      saveAllPostIds([id]);
      setActiveId(id);
      savePost(id, { title: d.title || '', body: d.body || '', saved: Date.now() });
      localStorage.removeItem('pb_v4');
      setEditorContent(d.body, d.title);
    } else {
      let activeId = getActiveId();
      if (!activeId && ids.length) { activeId = ids[ids.length - 1]; setActiveId(activeId); }
      if (activeId) {
        const post = getPost(activeId);
        if (post) setEditorContent(post.body, post.title);
      }
    }

    const savedTarget = parseInt(localStorage.getItem('pb_target'), 10);
    if (savedTarget > 0) wordTarget = savedTarget;
    updateWordCount();
    updateTargetToggleBtn();

    // 'pb_dark' is stored as the string "true" or "false"
    if (localStorage.getItem('pb_dark') === 'true') setDark(true);

    // Do an initial save to ensure a freshly-opened session has a record
    silentSave();
    requestAnimationFrame(() => elEditor.focus());
  } catch { /* corrupt localStorage — start fresh */ }
}

function copyText() {
  const title = elPostTitle.value.trim();
  const body  = walkEditorText('\n').replace(/\n{3,}/g, '\n\n').trim();
  navigator.clipboard.writeText((title ? title + '\n\n' : '') + body)
    .then(() => showToast('Copied ✓'))
    .catch(() => showToast('Copy failed — try Cmd+A, Cmd+C'));
}

function showToast(msg) {
  elToast.textContent = msg;
  elToast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => elToast.classList.remove('show'), 2000);
}

// ── Compare mode ───────────────────────────────────────
function toggleCompare() {
  compareMode = !compareMode;
  elWritingArea.classList.toggle('compare-mode', compareMode);
  elBtnCompare.classList.toggle('on', compareMode);

  if (compareMode) {
    requestAnimationFrame(() => elPaneB.classList.add('visible'));
    // Override the CSS default-hidden rule with an inline style
    document.getElementById('paneALabel').style.display = 'block';
    document.getElementById('paneAFooter').style.display = 'flex';
    document.querySelector('.word-count-wrap').classList.add('compare-mode-active');
    updatePaneACount();
    updateComparePaneCount();
  } else {
    elPaneB.classList.remove('visible');
    // Remove inline style so CSS default (display:none) takes back over
    document.getElementById('paneALabel').style.removeProperty('display');
    document.getElementById('paneAFooter').style.removeProperty('display');
    document.querySelector('.word-count-wrap').classList.remove('compare-mode-active');
  }
}

function countWords(el) {
  const parts = [];
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) { parts.push(node.textContent); }
    else if (node.nodeType === Node.ELEMENT_NODE) {
      if (BLOCK_TAGS.has(node.tagName)) parts.push(' ');
      for (const c of node.childNodes) walk(c);
      if (BLOCK_TAGS.has(node.tagName)) parts.push(' ');
    }
  }
  walk(el);
  const t = parts.join('').trim();
  return t ? t.split(/\s+/).length : 0;
}

function fmtCount(n) { return n + ' word' + (n !== 1 ? 's' : ''); }

function updatePaneACount() {
  if (!compareMode) return;
  document.getElementById('paneACount').textContent = fmtCount(countWords(elEditor));
}

function updateComparePaneCount() {
  document.getElementById('paneBCount').textContent = fmtCount(countWords(elEditorB));
}


</script>
