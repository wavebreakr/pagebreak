<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pagebreak</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Theme: Paper (default) ── */
    --bg-canvas:      #edeae2;
    --editor-bg:      #faf9f7;
    --ink:            #1c1b18;
    --ink-mid:        #6b6860;
    --ink-dim:        #a8a49c;
    --ink-faint:      rgba(0,0,0,0.07);
    --accent:         #c2692a;
    --accent-light:   #e8874a;
    --accent-dim:     rgba(194,105,42,0.1);
    --panel-bg:       rgba(250,248,244,0.82);
    --panel-border:   rgba(0,0,0,0.08);
    --link:           #2a6aaa;
    --glass-bg:       rgba(255,255,255,0.58);
    --glass-border:   rgba(255,255,255,0.75);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.9) inset, 0 8px 32px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 8px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --blur:           blur(18px) saturate(1.6);
  }

  /* ── Theme: Slate ── */
  .theme-slate {
    --bg-canvas:      #dce3eb;
    --editor-bg:      #f0f4f8;
    --ink:            #18202a;
    --ink-mid:        #5a6878;
    --ink-dim:        #98a6b5;
    --ink-faint:      rgba(30,60,100,0.07);
    --accent:         #2e6da4;
    --accent-light:   #5090c8;
    --accent-dim:     rgba(46,109,164,0.1);
    --panel-bg:       rgba(236,242,248,0.85);
    --panel-border:   rgba(30,60,100,0.09);
    --link:           #1a5c9e;
    --glass-bg:       rgba(230,238,248,0.62);
    --glass-border:   rgba(255,255,255,0.72);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.88) inset, 0 8px 32px rgba(20,50,90,0.1), 0 1px 2px rgba(20,50,90,0.07);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 8px rgba(20,50,90,0.08), 0 1px 2px rgba(20,50,90,0.05);
    --blur:           blur(18px) saturate(1.5);
  }

  /* ── Theme: Meadow ── */
  .theme-meadow {
    --bg-canvas:      #d8e5da;
    --editor-bg:      #f2f7f2;
    --ink:            #18241a;
    --ink-mid:        #567060;
    --ink-dim:        #91aa98;
    --ink-faint:      rgba(20,70,30,0.07);
    --accent:         #3a7d52;
    --accent-light:   #5ea872;
    --accent-dim:     rgba(58,125,82,0.1);
    --panel-bg:       rgba(238,246,240,0.85);
    --panel-border:   rgba(20,70,30,0.09);
    --link:           #2c6e44;
    --glass-bg:       rgba(228,242,232,0.62);
    --glass-border:   rgba(255,255,255,0.72);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.88) inset, 0 8px 32px rgba(20,60,30,0.1), 0 1px 2px rgba(20,60,30,0.07);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 8px rgba(20,60,30,0.08), 0 1px 2px rgba(20,60,30,0.05);
    --blur:           blur(18px) saturate(1.5);
  }

  .dark {
    --bg-canvas:      #18160f;
    --editor-bg:      #141412;
    --ink:            #e8e4db;
    --ink-mid:        #968f84;
    --ink-dim:        #4a4740;
    --ink-faint:      rgba(255,255,255,0.06);
    --panel-bg:       rgba(24,22,16,0.85);
    --panel-border:   rgba(255,255,255,0.07);
    --link:           #5a9fd4;
    --glass-bg:       rgba(38,35,28,0.62);
    --glass-border:   rgba(255,255,255,0.1);
    --glass-shadow:    0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 32px rgba(0,0,0,0.32), 0 1px 2px rgba(0,0,0,0.2);
    --glass-shadow-sm: 0 1px 0 rgba(255,255,255,0.05) inset, 0 2px 8px rgba(0,0,0,0.28), 0 1px 2px rgba(0,0,0,0.16);
    --blur:           blur(20px) saturate(1.4);
  }
  .dark.theme-slate {
    --bg-canvas: #0f151c; --editor-bg: #0c1018;
    --ink: #dce6f0; --ink-mid: #7a92a8; --ink-dim: #384858;
    --glass-bg: rgba(20,32,48,0.65); --glass-border: rgba(120,170,220,0.1);
  }
  .dark.theme-meadow {
    --bg-canvas: #0f1810; --editor-bg: #0c1410;
    --ink: #d8eadc; --ink-mid: #6a8870; --ink-dim: #344838;
    --glass-bg: rgba(18,36,22,0.65); --glass-border: rgba(100,180,120,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  /* iOS safe area — falls back to 0 on non-notch devices */
  :root {
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left, 0px);
    --safe-right:  env(safe-area-inset-right, 0px);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg-canvas);
    transition: background 0.4s;
  }

  /* Noise grain overlay */
  body::before {
    content: '';
    pointer-events: none;
    position: fixed; inset: 0; z-index: 0; opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ── Chrome ── */
  .chrome {
    position: fixed; top: 0; left: 0; right: 0;
    height: calc(48px + var(--safe-top));
    padding-top: var(--safe-top);
    display: flex; align-items: center; justify-content: space-between;
    padding-left: max(16px, var(--safe-left));
    padding-right: max(16px, var(--safe-right));
    gap: 12px;
    background: transparent;
    z-index: 100;
    transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .chrome.panel-open { left: 220px; }
  .chrome-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chrome-right { display: flex; align-items: center; gap: 6px;  flex-shrink: 0; }

  .brand { display: flex; align-items: center; flex-shrink: 0; }
  .brand img { height: 28px; width: auto; display: block; }
  .dark .brand img { filter: invert(1); }

  .chrome-sep { width: 1px; height: 16px; background: transparent; flex-shrink: 0; }

  .post-title-inline {
    font-size: 13px;
    color: var(--ink-dim); background: none; border: none; outline: none;
    width: 220px; max-width: 30vw;
    transition: color 0.2s;
  }
  .post-title-inline::placeholder { color: var(--ink-dim); }
  .post-title-inline:focus { color: var(--ink-mid); }

  .word-count {
    font-size: 12px; font-weight: 500; color: var(--ink-dim);
    font-variant-numeric: tabular-nums; min-width: 54px; text-align: right;
  }
  #wordCount {
    cursor: pointer; border-radius: 6px;
    padding: 2px 6px; margin: -2px -6px;
    transition: background 0.15s, color 0.15s;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-decoration-color: var(--ink-dim);
    text-underline-offset: 3px;
  }
  #wordCount:hover { background: var(--ink-faint); color: var(--ink-mid); text-decoration-color: var(--ink-mid); }
  /* Reading level sits inline; zero min-width so it only takes space it needs */
  #readingLevel { min-width: 0; }

  .target-input {
    font-size: 12px; font-weight: 500; color: var(--ink-mid);
    font-variant-numeric: tabular-nums; width: 72px; text-align: right;
    background: var(--ink-faint); border: none; outline: none;
    border-radius: 6px; padding: 2px 5px;
    display: none;
  }
  /* inline-block keeps it in-flow with the surrounding chrome spans */
  .target-input.show { display: inline-block; }

  .word-target-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    border-radius: 0 1px 1px 0;
  }
  .word-target-progress.done { background: linear-gradient(90deg, #4a9e6a, #6ec48a); }

  /* Glass icon button */
  .icon-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--glass-border); border-radius: 8px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink-mid);
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
  }
  .icon-btn:hover {
    background: rgba(255,255,255,0.82);
    box-shadow: 0 1px 0 #fff inset, 0 4px 14px rgba(0,0,0,0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .icon-btn:hover { background: rgba(255,255,255,0.1); }
  .icon-btn.on {
    background: var(--ink); color: var(--bg-canvas);
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.22);
  }
  /* Small variant used for the new-post button in the sidebar header */
  .icon-btn--sm { width: 24px; height: 24px; font-size: 16px; border-radius: 5px; }

  /* Glass text button */
  .copy-btn {
    font-size: 11px; font-weight: 500;
    padding: 0 11px; height: 30px;
    border: 1px solid var(--glass-border); border-radius: 8px;
    background: var(--glass-bg); box-shadow: var(--glass-shadow-sm);
    cursor: pointer; color: var(--ink-mid);
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, transform 0.15s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.82);
    box-shadow: 0 1px 0 #fff inset, 0 4px 14px rgba(0,0,0,0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .dark .copy-btn:hover { background: rgba(255,255,255,0.1); }
  .copy-btn svg { width: 12px; height: 12px; stroke: currentColor; flex-shrink: 0; }

  .save-status {
    font-size: 11px; color: var(--ink-dim);
    opacity: 0; transition: opacity 0.4s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .save-status.show { opacity: 1; }

  /* ── Layout ── */
  .writing-area {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; overflow: hidden;
  }

  .editor-wrap {
    flex: 1; overflow-y: auto;
    padding-top: calc(100px + var(--safe-top));
    padding-bottom: calc(120px + var(--safe-bottom));
    background: var(--editor-bg);
    transition: background 0.4s;
    /* Standard Firefox scrollbar styling */
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,0.12) transparent;
  }
  .editor-wrap::-webkit-scrollbar { width: 3px; }
  .editor-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .editor-inner { max-width: 640px; margin: 0 auto; padding: 0 36px; }

  /* ── Editor ──
     min-height accounts for: 48px chrome + 52px top padding + ~100px breathing room */
  .editor {
    font-family: 'Lora', serif;
    font-size: 18px; line-height: 1.9;
    color: var(--ink); caret-color: var(--accent);
    outline: none; min-height: calc(100vh - 200px);
    transition: color 0.3s;
    letter-spacing: 0.005em;
    /* break-word is a legacy alias; overflow-wrap is the standard equivalent */
    overflow-wrap: break-word;
    word-break: normal;
  }
  .editor:empty::before {
    content: attr(data-placeholder);
    color: var(--ink-dim); font-style: italic; pointer-events: none;
  }

  /* margin-top spacing so the first child never has a gap above it */
  .editor p,
  .editor div { margin-top: 1.15em; }
  .editor p:first-child,
  .editor div:first-child { margin-top: 0; }

  .editor ul { padding-left: 1.4em; margin-top: 1.15em; list-style: disc; }
  .editor ul:first-child { margin-top: 0; }
  .editor ul li { margin-bottom: 0.2em; line-height: 1.9; }
  .editor ul ul { margin-top: 0; list-style: circle; }
  .editor ul ul ul { list-style: square; }

  .editor hr { border: none; border-top: 1px solid var(--ink-faint); margin: 1.5em 0; }

  .editor a {
    color: var(--link); text-decoration: underline;
    text-underline-offset: 2px; cursor: pointer;
  }
  .editor a:hover { opacity: 0.8; }

  .editor strong { font-weight: 700; }
  .editor em { font-style: italic; }

  .editor h1, .editor h2, .editor h3 {
    font-family: 'Lora', serif; font-weight: 600; color: var(--ink);
    line-height: 1.3; margin-top: 1.15em; margin-bottom: 0.5em;
    letter-spacing: -0.02em;
  }
  .editor h1:first-child,
  .editor h2:first-child,
  .editor h3:first-child { margin-top: 0; }
  .editor h1 { font-size: 2em; }
  .editor h2 { font-size: 1.5em; }
  .editor h3 { font-size: 1.2em; }

  /* ── Celebration pill ── */
  .celebration {
    position: fixed; top: 62px; left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
    color: var(--ink); font-size: 13px; font-weight: 500;
    padding: 8px 20px; border-radius: 24px;
    opacity: 0; pointer-events: none; z-index: 300;
    transition: opacity 0.3s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; letter-spacing: -0.01em;
  }
  .celebration.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    font-size: 12px; font-weight: 500; color: var(--ink-mid);
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
    border-radius: 10px; padding: 7px 14px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    transform: translateY(6px); pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Posts sidebar ── */
  .posts-panel {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid var(--panel-border);
    background: var(--panel-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s, border-color 0.4s;
    padding-top: var(--safe-top);
    /* order:-1 places sidebar before editor visually; DOM order keeps editor first for screen readers */
    order: -1;
  }
  /* When hidden, border is invisible due to overflow:hidden, but zeroing it prevents transition artefacts */
  .posts-panel.hidden { width: 0; opacity: 0; border-right-width: 0; }

  .posts-panel-header {
    padding: 16px 14px 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .posts-panel-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-dim);
  }
  .posts-list {
    flex: 1; overflow-y: auto;
    padding: 8px; display: flex; flex-direction: column; gap: 3px;
    scrollbar-width: thin;
    scrollbar-color: var(--ink-faint) transparent;
  }
  .posts-list::-webkit-scrollbar { width: 2px; }
  .posts-list::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

  .post-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .post-row:hover { background: rgba(255,255,255,0.55); box-shadow: var(--glass-shadow-sm); }
  .dark .post-row:hover { background: rgba(255,255,255,0.05); }
  .post-row.active { background: var(--accent-dim); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset; }
  .post-row-info { flex: 1; min-width: 0; }
  .post-row-title {
    font-size: 12.5px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em; line-height: 1.3;
  }
  .post-row.active .post-row-title { color: var(--accent); }
  .post-row-meta { font-size: 10.5px; color: var(--ink-dim); margin-top: 2px; }
  .post-row-delete {
    width: 20px; height: 20px; border-radius: 5px;
    border: none; background: none; cursor: pointer;
    color: var(--ink-dim); font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: background 0.15s, color 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .post-row:hover .post-row-delete { opacity: 1; }
  .post-row-delete:hover { background: rgba(184,74,74,0.12); color: #b84a4a; }

  /* ── Slash menu ── */
  .slash-menu {
    position: fixed;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 12px; padding: 5px;
    box-shadow: var(--glass-shadow); z-index: 500;
    display: none; flex-direction: column; gap: 2px; min-width: 160px;
  }
  .slash-menu.show { display: flex; }
  .slash-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.12s;
  }
  .slash-item:hover,
  .slash-item.active { background: var(--ink-faint); }
  .slash-item-icon {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    width: 22px; flex-shrink: 0; letter-spacing: -0.02em;
  }
  /* The paragraph symbol (¶) needs a slightly larger size */
  .slash-item-icon--para { font-size: 14px; font-weight: 400; }
  .slash-item-label { font-size: 12.5px; font-weight: 500; color: var(--ink); }

  /* ── Theme picker ── */
  .theme-btn-wrap { position: relative; }
  .theme-indicator {
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f5f2ea, #d8d3c6);
    border: 1.5px solid rgba(0,0,0,0.15);
    flex-shrink: 0; pointer-events: none; transition: background 0.3s;
  }
  #btnTheme { display: flex; align-items: center; justify-content: center; gap: 5px; }

  .theme-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 12px; padding: 5px;
    box-shadow: var(--glass-shadow);
    display: flex; flex-direction: column; gap: 2px; min-width: 130px;
    opacity: 0; pointer-events: none;
    transform: translateY(-4px) scale(0.97); transform-origin: top right;
    transition: opacity 0.15s, transform 0.15s; z-index: 200;
  }
  .theme-dropdown.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }

  .theme-option {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.12s;
  }
  .theme-option:hover { background: var(--ink-faint); }
  .theme-option.active { background: var(--accent-dim); }
  .theme-option-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.12);
  }
  .theme-option-dot.dot-paper  { background: radial-gradient(circle at 35% 35%, #f5f2ea, #d8d3c6); }
  .theme-option-dot.dot-slate  { background: radial-gradient(circle at 35% 35%, #e4ecf4, #bfcfdf); }
  .theme-option-dot.dot-meadow { background: radial-gradient(circle at 35% 35%, #e4f0e6, #bdd4c2); }
  .theme-option-label { font-size: 12px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }

  /* ── Mesh gradients for Slate + Meadow ── */
  .theme-slate .editor-wrap {
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(190,215,245,0.45) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 85% 75%, rgba(180,205,235,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(210,228,248,0.2)  0%, transparent 70%),
      var(--editor-bg);
  }
  .theme-meadow .editor-wrap {
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(185,225,195,0.45) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 85% 75%, rgba(175,215,185,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(205,235,210,0.2)  0%, transparent 70%),
      var(--editor-bg);
  }
  .dark.theme-slate .editor-wrap {
    background:
      radial-gradient(ellipse 70% 50% at 10% 15%, rgba(40,80,130,0.3)  0%, transparent 65%),
      radial-gradient(ellipse 55% 45% at 88% 80%, rgba(30,60,110,0.25) 0%, transparent 60%),
      var(--editor-bg);
  }
  .dark.theme-meadow .editor-wrap {
    background:
      radial-gradient(ellipse 70% 50% at 10% 15%, rgba(30,80,45,0.3)  0%, transparent 65%),
      radial-gradient(ellipse 55% 45% at 88% 80%, rgba(25,65,35,0.25) 0%, transparent 60%),
      var(--editor-bg);
  }

  /* ── Mobile menu button (hidden on desktop) ── */
  .mobile-menu-btn { display: none; }

  /* ── Mobile drawer ── */
  .mobile-drawer {
    display: none; /* shown via JS on mobile */
    position: fixed;
    top: calc(48px + var(--safe-top));
    left: 0; right: 0;
    background: var(--glass-bg);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    z-index: 99;
    padding: 10px 16px calc(10px + var(--safe-bottom));
    flex-direction: column; gap: 2px;
    transform: translateY(-8px);
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  .mobile-drawer.open {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }
  .drawer-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px;
    border-bottom: 1px solid var(--ink-faint);
    font-size: 13px; font-weight: 500; color: var(--ink);
  }
  .drawer-row:last-child { border-bottom: none; }
  .drawer-row-label { color: var(--ink-mid); font-size: 12px; }
  .drawer-actions { display: flex; align-items: center; gap: 6px; }

  /* Theme dots row inside drawer */
  .drawer-theme-options {
    display: flex; gap: 6px;
  }
  .drawer-theme-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .drawer-theme-dot:hover { transform: scale(1.15); }
  .drawer-theme-dot.active { border-color: var(--accent); }
  .drawer-theme-dot.dot-paper  { background: radial-gradient(circle at 35% 35%, #f5f2ea, #d8d3c6); }
  .drawer-theme-dot.dot-slate  { background: radial-gradient(circle at 35% 35%, #e4ecf4, #bfcfdf); }
  .drawer-theme-dot.dot-meadow { background: radial-gradient(circle at 35% 35%, #e4f0e6, #bdd4c2); }

  @media (max-width: 700px) {
    .posts-panel { display: none; }
    .editor-inner { padding: 0 20px; }
    .post-title-inline { width: 140px; max-width: 140px; }

    /* Hide the full desktop chrome-right; show hamburger instead */
    .chrome-right { display: none; }
    .mobile-menu-btn { display: flex; }

    /* Show drawer as flex when active */
    .mobile-drawer { display: flex; }
  }
</style>
</head>
<body>

<div class="chrome">
  <div class="chrome-left">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/wavebreakr/pagebreak/main/PagebreakLogo2.png" alt="Pagebreak">

  <div class="chrome-right">

    <button class="copy-btn" title="Copy all text to clipboard" aria-label="Copy to clipboard" onclick="copyText()">

    <div class="theme-btn-wrap">

          <path d="M1 1l4 4 4-4"/>

  </div>
  <!-- Hamburger — only visible on mobile via media query -->
  <button class="icon-btn mobile-menu-btn" id="btnMobileMenu"

      <line x1="2" y1="4.5" x2="14" y2="4.5"/>
      <line x1="2" y1="8"   x2="14" y2="8"/>

<!-- Mobile drawer — slides down from chrome on mobile only -->
<div class="mobile-drawer" id="mobileDrawer" aria-label="Options menu">
  <div class="drawer-row">

    <div class="drawer-theme-options">

      <span class="drawer-theme-dot dot-slate"         id="drawerDotSlate"  title="Slate"  onclick="setTheme('slate');  updateDrawerDots('slate')"></span>

        <path d="M11 4V3a1 1 0 0 0-1-1H3a1.5 1.5 0 0 0-1.5 1.5v8A1 1 0 0 0 3 12.5h2"/>

    <button class="copy-btn" onclick="downloadText(); closeMobileDrawer()">

<div class="writing-area">

  </div>
  <div class="editor-wrap">
    <div class="editor-inner">
      <div class="editor" id="editor"
        contenteditable="true"
        data-placeholder="Start writing…"
        spellcheck="true"
        role="textbox"
        aria-multiline="true"
        aria-label="Editor"></div>
    </div>
  </div>
</div>

<div class="celebration" id="celebration" aria-live="polite" aria-atomic="true"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div class="slash-menu" id="slashMenu" role="menu" aria-label="Insert block type">
  <div class="slash-item" role="menuitem" onclick="applySlashFormat('h1')">
    <span class="slash-item-icon" aria-hidden="true">H1</span>
    <span class="slash-item-label">Heading 1</span>
  </div>
  <div class="slash-item" role="menuitem" onclick="applySlashFormat('h2')">
    <span class="slash-item-icon" aria-hidden="true">H2</span>
    <span class="slash-item-label">Heading 2</span>
  </div>
  <div class="slash-item" role="menuitem" onclick="applySlashFormat('h3')">
    <span class="slash-item-icon" aria-hidden="true">H3</span>
    <span class="slash-item-label">Heading 3</span>
  </div>
  <div class="slash-item" role="menuitem" onclick="applySlashFormat('p')">
    <span class="slash-item-icon slash-item-icon--para" aria-hidden="true">&para;</span>
    <span class="slash-item-label">Paragraph</span>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────
let isDark           = false;
let wordTarget       = 0;
let targetCelebrated = false;
let slashMenuOpen    = false;
let slashActiveIndex = 0;
let isComposing      = false; // IME composition guard
const SLASH_ITEMS    = ['h1', 'h2', 'h3', 'p'];

// Autosave timer — module-level so both onType and onTitleType share it
let _saveTimer = null;

// Cached element references — populated once in DOMContentLoaded
let elEditor, elPostsPanel, elWordCount, elReadingLevel,
    elTargetInput, elSaveStatus, elProgressBar, elCelebration, elToast,
    elPostTitle, elPostsList, elSlashMenu, elThemeDropdown,
    elThemeIndicator, elBtnDark, elBtnPosts, elBtnTheme,
    elOptPaper, elOptSlate, elOptMeadow,
    elMobileDrawer, elBtnMobileMenu, elDrawerBtnDark,
    elDrawerDotPaper, elDrawerDotSlate, elDrawerDotMeadow, elDrawerWordCount;

// Module-level constants for DOM-walking hot paths (avoids per-call allocations)
const BLOCK_RE   = /^(P|DIV|LI|BR|UL|OL)$/;
const BLOCK_TAGS = new Set(['P', 'DIV', 'LI', 'BR', 'H1', 'H2', 'H3', 'UL', 'OL']);
// Inline regex for block-walking in keydown handlers (P/DIV/LI only)
const PARA_RE    = /^(P|DIV|LI)$/;

// ── Init ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  elEditor        = document.getElementById('editor');
  elPostsPanel    = document.getElementById('postsPanel');
  elWordCount     = document.getElementById('wordCount');
  elReadingLevel  = document.getElementById('readingLevel');
  elTargetInput   = document.getElementById('targetInput');
  elSaveStatus    = document.getElementById('saveStatus');
  elProgressBar   = document.getElementById('wordTargetProgress');
  elCelebration   = document.getElementById('celebration');
  elToast         = document.getElementById('toast');
  elPostTitle     = document.getElementById('postTitleInline');
  elPostsList     = document.getElementById('postsList');
  elSlashMenu     = document.getElementById('slashMenu');
  elThemeDropdown = document.getElementById('themeDropdown');
  elThemeIndicator= document.getElementById('themeIndicator');
  elBtnDark       = document.getElementById('btnDark');
  elBtnPosts      = document.getElementById('btnPosts');
  elBtnTheme      = document.getElementById('btnTheme');
  elOptPaper      = document.getElementById('opt-paper');
  elOptSlate      = document.getElementById('opt-slate');
  elOptMeadow     = document.getElementById('opt-meadow');
  elMobileDrawer  = document.getElementById('mobileDrawer');
  elBtnMobileMenu = document.getElementById('btnMobileMenu');
  elDrawerBtnDark = document.getElementById('drawerBtnDark');
  elDrawerDotPaper  = document.getElementById('drawerDotPaper');
  elDrawerDotSlate  = document.getElementById('drawerDotSlate');
  elDrawerDotMeadow = document.getElementById('drawerDotMeadow');
  elDrawerWordCount = document.getElementById('drawerWordCount');

  // defaultParagraphSeparator must be set before any content is loaded
  // NOTE: execCommand is deprecated but remains the only viable API for
  // contenteditable editing at this level without a full editor framework.
  document.execCommand('defaultParagraphSeparator', false, 'p');

  loadDoc();

  // Autosave every 20s as a backstop for the 5s debounce
  setInterval(silentSave, 20000);

  // Save on tab close/refresh — localStorage.setItem is synchronous so this works
  window.addEventListener('beforeunload', silentSave);

  // Cmd/Ctrl+S
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); silentSave(); }
  });

  elEditor.addEventListener('keydown', onEditorKeydown);
  elEditor.addEventListener('input', onEditorInput);

  // Track IME composition to avoid false slash-menu triggers on CJK input
  elEditor.addEventListener('compositionstart', () => { isComposing = true; });
  elEditor.addEventListener('compositionend',   () => { isComposing = false; });

  // Plain-text paste only
  elEditor.addEventListener('paste', e => {
    e.preventDefault();
    document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
  });

  // Word target input handlers
  elTargetInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commitTarget(); }
    if (e.key === 'Escape') { e.preventDefault(); clearTarget(); }
  });
  elTargetInput.addEventListener('blur', () => {
    if (elTargetInput.classList.contains('show')) commitTarget();
  });

  // Close menus on outside click
  document.addEventListener('mousedown', e => {
    if (slashMenuOpen && !elSlashMenu.contains(e.target)) closeSlashMenu();
    if (elThemeDropdown.classList.contains('open') &&
        !elThemeDropdown.contains(e.target) &&
        !elBtnTheme.contains(e.target)) {
      closeThemeDropdown();
    }
    if (elMobileDrawer && elMobileDrawer.classList.contains('open') &&
        !elMobileDrawer.contains(e.target) &&
        !elBtnMobileMenu.contains(e.target)) {
      closeMobileDrawer();
    }
  });
});

// ── Editor keydown handler ─────────────────────────────
function onEditorKeydown(e) {
  // Slash menu navigation — handle before anything else
  if (slashMenuOpen) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      slashActiveIndex = (slashActiveIndex + 1) % SLASH_ITEMS.length;
      updateSlashActive(); return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      slashActiveIndex = (slashActiveIndex - 1 + SLASH_ITEMS.length) % SLASH_ITEMS.length;
      updateSlashActive(); return;
    }
    if (e.key === 'Enter')  { e.preventDefault(); applySlashFormat(SLASH_ITEMS[slashActiveIndex]); return; }
    if (e.key === 'Escape') { e.preventDefault(); closeSlashMenu(); return; }
    closeSlashMenu(); // any other key — close and fall through to normal handling
  }

  const mod = e.metaKey || e.ctrlKey;

  // Bold / Italic
  if (mod && e.key === 'b') { e.preventDefault(); document.execCommand('bold');   return; }
  if (mod && e.key === 'i') { e.preventDefault(); document.execCommand('italic'); return; }

  // Tab — indent/outdent in lists, otherwise insert spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== elEditor) {
        if (node.nodeName === 'LI') {
          document.execCommand(e.shiftKey ? 'outdent' : 'indent');
          return;
        }
        node = node.parentNode;
      }
    }
    document.execCommand('insertText', false, '    ');
    return;
  }

  const sel = window.getSelection();

  // Space — "- " → unordered list
  if (e.key === ' ') {
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return;
    let block = range.startContainer;
    while (block && block !== elEditor && !PARA_RE.test(block.nodeName)) {
      block = block.parentNode;
    }
    if (!block || block === elEditor) return;
    const pre = document.createRange();
    pre.setStart(block, 0);
    pre.setEnd(range.startContainer, range.startOffset);
    if (pre.toString() === '-') {
      e.preventDefault();
      const del = document.createRange();
      del.setStart(range.startContainer, range.startOffset - 1);
      del.setEnd(range.startContainer, range.startOffset);
      sel.removeAllRanges(); sel.addRange(del);
      document.execCommand('delete');
      document.execCommand('insertUnorderedList');
      onType(); return;
    }
    // Pass sel to avoid a redundant window.getSelection() call inside linkifyAtCursor
    linkifyAtCursor(sel);
    // Note: we return here but do NOT call e.preventDefault(), so the browser
    // still inserts the space character via its default keydown handling.
    return;
  }

  // Enter — "-----" → <hr>
  if (e.key === 'Enter') {
    const range = sel && sel.rangeCount ? sel.getRangeAt(0) : null;
    if (range && range.collapsed) {
      let block = range.startContainer;
      while (block && block !== elEditor && !PARA_RE.test(block.nodeName)) {
        block = block.parentNode;
      }
      if (block && block !== elEditor && block.textContent.trim() === '-----') {
        e.preventDefault();
        const r = document.createRange();
        r.selectNodeContents(block);
        sel.removeAllRanges(); sel.addRange(r);
        document.execCommand('insertHTML', false, '<hr><p><br></p>');
        onType(); return;
      }
    }
    // Linkify after the browser creates the new line.
    // This is mostly a no-op (cursor offset is 0 on the new line) but
    // handles the edge case of pressing Enter mid-URL.
    setTimeout(() => linkifyAtCursor(), 0);
  }
}

// ── Editor input handler ───────────────────────────────
function onEditorInput() {
  onType();
  // Skip slash detection during IME composition (CJK input)
  if (slashMenuOpen || isComposing) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed || range.startContainer.nodeType !== Node.TEXT_NODE) return;
  let block = range.startContainer;
  while (block && block !== elEditor && !/^(P|DIV|H[1-3])$/.test(block.nodeName)) {
    block = block.parentNode;
  }
  if (block && block !== elEditor && block.textContent.trim() === '/') openSlashMenu();
}

// ── URL Linkification ──────────────────────────────────
const URL_RE = /https?:\/\/[^\s<>"']+[^\s<>"'.,;:!?')\]]/;

function linkifyAtCursor(sel) {
  if (!sel) sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed) return;
  const textNode = range.startContainer;
  if (textNode.nodeType !== Node.TEXT_NODE) return;
  const text  = textNode.textContent.slice(0, range.startOffset);
  const match = URL_RE.exec(text);
  if (!match || match.index + match[0].length !== text.length) return;
  // Don't re-linkify if already inside an <a>
  let node = textNode.parentNode;
  while (node && node !== elEditor) {
    if (node.tagName === 'A') return;
    node = node.parentNode;
  }
  const linkRange = document.createRange();
  linkRange.setStart(textNode, match.index);
  linkRange.setEnd(textNode, match.index + match[0].length);
  sel.removeAllRanges(); sel.addRange(linkRange);
  document.execCommand('createLink', false, match[0]);
  sel.getRangeAt(0).collapse(false);
}

// ── Word count + target ────────────────────────────────
function onType() {
  updateWordCount();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(silentSave, 5000);
}

function getEditorText() {
  const parts = [];
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      parts.push(node.textContent);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      const isBlock = BLOCK_RE.test(node.tagName);
      if (isBlock) parts.push(' ');
      for (const child of node.childNodes) walk(child);
      if (isBlock) parts.push(' ');
    }
  }
  walk(elEditor);
  return parts.join('');
}

// ── Reading level (Flesch-Kincaid Grade) ──────────────
// NOTE: Syllable counting is a heuristic and will undercount for words like
// "create" (silent-e removal can merge syllables). Sentence counting splits
// on .!? so abbreviations like "Dr." or "U.S.A." inflate the count. These
// are known limitations of the algorithm; it's directionally correct.
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  word = word.replace(/e$/, '');
  const groups = word.match(/[aeiouy]+/g);
  return groups ? Math.max(1, groups.length) : 1;
}

function getReadingLevel(rawText) {
  const text = rawText.replace(/\s+/g, ' ').trim();
  if (!text) return '';
  // Count sentences without allocating an array — just count matches
  const sentenceCount = (text.match(/[.!?]+/g) || []).filter(m => m).length;
  if (!sentenceCount) return '';
  const words = text.split(/\s+/).filter(w => /[a-zA-Z]/.test(w));
  if (words.length < 10) return '';
  const syllables = words.reduce((sum, w) => sum + countSyllables(w), 0);
  const grade = 0.39 * (words.length / sentenceCount) + 11.8 * (syllables / words.length) - 15.59;
  const g = Math.min(Math.max(1, Math.round(grade)), 16);
  return '· Grade ' + g + (g === 16 ? '+' : '');
}

function updateWordCount() {
  const rawText = getEditorText();
  const trimmed = rawText.trim();
  const words   = trimmed ? trimmed.split(/\s+/).length : 0;
  elWordCount.textContent = wordTarget
    ? `${words} / ${wordTarget} word${wordTarget !== 1 ? 's' : ''}`
    : `${words} word${words !== 1 ? 's' : ''}`;
  if (elDrawerWordCount) elDrawerWordCount.textContent = elWordCount.textContent;
  elReadingLevel.textContent = getReadingLevel(rawText);
  updateTargetProgress(words);
  if (wordTarget > 0 && words === wordTarget && !targetCelebrated) {
    targetCelebrated = true;
    celebrate(`${words} words — target reached! ✦`);
  }
  // Reset flag when below target; also lock it when above (so overshooting
  // doesn't re-fire the celebration on the way back down through the target)
  if (wordTarget > 0 && words < wordTarget) targetCelebrated = false;
  if (wordTarget > 0 && words > wordTarget) targetCelebrated = true;
}

function openTargetInput() {
  elTargetInput.value = wordTarget || '';
  elTargetInput.classList.add('show');
  elWordCount.style.display = 'none';
  elTargetInput.focus();
  elTargetInput.select();
}

function commitTarget() {
  const val = parseInt(elTargetInput.value, 10);
  wordTarget = val > 0 ? val : 0;
  targetCelebrated = false;
  if (wordTarget) {
    localStorage.setItem('pb_target', wordTarget);
  } else {
    localStorage.removeItem('pb_target');
  }
  closeTargetInput();
  updateWordCount();
}

function clearTarget() {
  wordTarget = 0;
  targetCelebrated = false;
  localStorage.removeItem('pb_target');
  closeTargetInput();
  updateWordCount();
}

function closeTargetInput() {
  elTargetInput.classList.remove('show');
  elWordCount.style.display = '';
}

function updateTargetProgress(words) {
  if (!wordTarget) { elProgressBar.style.width = '0'; return; }
  elProgressBar.style.width = Math.min(words / wordTarget * 100, 100) + '%';
  elProgressBar.classList.toggle('done', words >= wordTarget);
}

function celebrate(msg) {
  elCelebration.textContent = msg;
  elCelebration.classList.add('show');
  clearTimeout(celebrate._t);
  celebrate._t = setTimeout(() => elCelebration.classList.remove('show'), 2600);
}

function onTitleType() {
  const title = elPostTitle.value.trim();
  document.title = title ? title + ' — Pagebreak' : 'Pagebreak';
  if (!elPostsPanel.classList.contains('hidden')) renderPostsList();
  // Schedule save — title changes don't affect word count
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(silentSave, 5000);
}

// ── Posts management ───────────────────────────────────
function genId() {
  return 'pb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}
function getAllPostIds() {
  try { return JSON.parse(localStorage.getItem('pb_posts') || '[]'); } catch { return []; }
}
function saveAllPostIds(ids) { localStorage.setItem('pb_posts', JSON.stringify(ids)); }
function getActiveId()       { return localStorage.getItem('pb_active') || null; }
function setActiveId(id)     { localStorage.setItem('pb_active', id); }
function getPost(id) {
  // localStorage.getItem returns null for missing keys; JSON.parse(null) === null (no error).
  // The try/catch only fires on malformed JSON.
  try { return JSON.parse(localStorage.getItem(id)); } catch { return null; }
}
function savePost(id, data)  { localStorage.setItem(id, JSON.stringify(data)); }
function deletePost(id) {
  localStorage.removeItem(id);
  saveAllPostIds(getAllPostIds().filter(i => i !== id));
}
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function togglePostsPanel() {
  const isHidden = elPostsPanel.classList.contains('hidden');
  if (isHidden) { silentSave(); renderPostsList(); }
  elPostsPanel.classList.toggle('hidden', !isHidden);
  elBtnPosts.classList.toggle('on', isHidden);
  document.querySelector('.chrome').classList.toggle('panel-open', isHidden);
}

function renderPostsList() {
  const ids      = getAllPostIds();
  const activeId = getActiveId();
  if (!ids.length) {
    elPostsList.innerHTML = '<div style="font-size:12px;color:var(--ink-dim);padding:8px 2px;">No posts yet.</div>';
    return;
  }
  elPostsList.innerHTML = [...ids].reverse().map(id => {
    const post = getPost(id);
    if (!post) return '';
    const title = post.title || 'Untitled post';
    // Strip HTML tags to count words; regex is safe here because content
    // has already passed through sanitizeBody
    const words = post.body
      ? post.body.replace(/<[^>]+>/g, ' ').split(/\s+/).filter(Boolean).length
      : 0;
    // Use navigator.language for locale-appropriate date formatting
    const date = post.saved
      ? new Date(post.saved).toLocaleDateString(navigator.language, { day: 'numeric', month: 'short' })
      : '';
    return `
      <div class="post-row${id === activeId ? ' active' : ''}" data-post-id="${id}"
        role="listitem" onclick="openPost('${id}')">
        <div class="post-row-info">
          <div class="post-row-title">${escHtml(title)}</div>
          <div class="post-row-meta">${words} word${words !== 1 ? 's' : ''} · ${date}</div>
        </div>
        <button class="post-row-delete"
          aria-label="Delete ${escHtml(title)}"
          onclick="event.stopPropagation();confirmDeletePost('${id}')">×</button>
      </div>`;
  }).join('');
}

// Shared helper — populates editor and chrome title from saved post data
function setEditorContent(body, title) {
  const t = (title || '').trim();
  elPostTitle.value  = title || '';
  elEditor.innerHTML = sanitizeBody(body || '');
  document.title     = t ? t + ' — Pagebreak' : 'Pagebreak';
  targetCelebrated   = false;
  updateWordCount();
}

function openPost(id) {
  silentSave();
  setActiveId(id);
  const post = getPost(id);
  if (post) setEditorContent(post.body, post.title);
  renderPostsList();
  elEditor.focus();
}

function newPost() {
  silentSave();
  const id = genId();
  try {
    saveAllPostIds([...getAllPostIds(), id]);
    savePost(id, { title: '', body: '', saved: Date.now() });
  } catch {
    showSaveStatus('⚠ Save failed', true); return;
  }
  setActiveId(id);
  setEditorContent('', '');
  renderPostsList();
  elEditor.focus();
}

function confirmDeletePost(id) {
  // Scope the query to the posts list, not the whole document
  const row = elPostsList.querySelector(`.post-row[data-post-id="${id}"]`);
  if (!row) return;
  const name = getPost(id)?.title || 'Untitled post';
  row.innerHTML = `
    <div class="post-row-info" style="min-width:0">
      <div class="post-row-title" style="color:#b84a4a;font-size:11px">Delete "${escHtml(name)}"?</div>
      <div class="post-row-meta">This can't be undone</div>
    </div>
    <button onclick="event.stopPropagation();doDeletePost('${id}')"
      style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:rgba(184,74,74,0.15);color:#b84a4a;cursor:pointer;flex-shrink:0;">Yes</button>
    <button onclick="event.stopPropagation();renderPostsList()"
      style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:var(--ink-faint);color:var(--ink-mid);cursor:pointer;flex-shrink:0;">No</button>
  `;
}

function doDeletePost(id) {
  // Save current work before any deletion, including when deleting a different post
  silentSave();
  const activeId = getActiveId();
  deletePost(id);
  if (id === activeId) {
    const ids = getAllPostIds();
    ids.length ? openPost(ids[ids.length - 1]) : newPost();
    return;
  }
  renderPostsList();
}

// ── Theme ──────────────────────────────────────────────
const THEME_DOTS = {
  paper:  'radial-gradient(circle at 35% 35%, #f5f2ea, #d8d3c6)',
  slate:  'radial-gradient(circle at 35% 35%, #e4ecf4, #bfcfdf)',
  meadow: 'radial-gradient(circle at 35% 35%, #e4f0e6, #bdd4c2)',
};
// Cached map of theme id → option element, populated after DOM is ready
let _themeOpts;

function setTheme(theme, save = true) {
  document.body.classList.remove('theme-slate', 'theme-meadow');
  if (theme !== 'paper') document.body.classList.add('theme-' + theme);
  elThemeIndicator.style.background = THEME_DOTS[theme] || THEME_DOTS.paper;
  // Update active option using the cached map
  if (_themeOpts) {
    Object.values(_themeOpts).forEach(el => el.classList.remove('active'));
    if (_themeOpts[theme]) _themeOpts[theme].classList.add('active');
  }
  // Keep mobile drawer dots in sync
  updateDrawerDots(theme);
  // Only close the dropdown on user-initiated theme changes, not on load
  if (save) {
    closeThemeDropdown();
    localStorage.setItem('pb_theme', theme);
  }
}

function toggleThemeDropdown() {
  const isOpen = elThemeDropdown.classList.toggle('open');
  elBtnTheme.setAttribute('aria-expanded', isOpen);
}
function closeThemeDropdown() {
  elThemeDropdown.classList.remove('open');
  elBtnTheme.setAttribute('aria-expanded', 'false');
}

// ── Dark mode ──────────────────────────────────────────
function setDark(on) {
  isDark = on;
  document.body.classList.toggle('dark', on);
  const icon = on ? '☀️' : '🌙';
  elBtnDark.querySelector('span').textContent = icon;
  if (elDrawerBtnDark) elDrawerBtnDark.querySelector('span').textContent = icon;
  elBtnDark.classList.toggle('on', on);
}

function toggleDark() {
  setDark(!isDark);
  localStorage.setItem('pb_dark', isDark);
}

// ── Save / Load ────────────────────────────────────────

// Strip inline color/background injected by Chromium's contenteditable so
// saved HTML defers to CSS variables and renders correctly across themes.
function sanitizeBody(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty('color');
    el.style.removeProperty('background-color');
    el.style.removeProperty('background');
    // getAttribute can return null if a prior removeProperty already cleared it
    const remaining = el.getAttribute('style') || '';
    if (!remaining.trim()) el.removeAttribute('style');
  });
  return tmp.innerHTML;
}

function silentSave() {
  let id = getActiveId();
  try {
    if (!id) {
      id = genId();
      saveAllPostIds([...getAllPostIds(), id]);
      setActiveId(id);
    }
    savePost(id, {
      title: elPostTitle.value,
      body:  sanitizeBody(elEditor.innerHTML),
      saved: Date.now(),
    });
    showSaveStatus('Saved');
    // Only re-render the list if the panel is open — inside try so we only
    // update the UI after confirming the save succeeded
    if (!elPostsPanel.classList.contains('hidden')) renderPostsList();
  } catch {
    showSaveStatus('⚠ Save failed', true);
  }
}

function showSaveStatus(msg, isError = false) {
  elSaveStatus.textContent = msg;
  elSaveStatus.style.color = isError ? '#b84a4a' : '';
  elSaveStatus.classList.add('show');
  clearTimeout(showSaveStatus._t);
  showSaveStatus._t = setTimeout(() => elSaveStatus.classList.remove('show'), isError ? 4000 : 2000);
}

function loadDoc() {
  try {
    // Build the cached theme-option element map now that the DOM is ready
    _themeOpts = { paper: elOptPaper, slate: elOptSlate, meadow: elOptMeadow };

    const ids = getAllPostIds();

    // Migrate legacy single-doc save (pb_v4) into the multi-post system
    const legacy = localStorage.getItem('pb_v4');
    if (legacy && !ids.length) {
      const d  = JSON.parse(legacy);
      const id = genId();
      saveAllPostIds([id]);
      setActiveId(id);
      savePost(id, { title: d.title || '', body: d.body || '', saved: Date.now() });
      localStorage.removeItem('pb_v4');
      setEditorContent(d.body, d.title);
    } else {
      let activeId = getActiveId();
      if (!activeId && ids.length) { activeId = ids[ids.length - 1]; setActiveId(activeId); }
      if (activeId) {
        const post = getPost(activeId);
        if (post) setEditorContent(post.body, post.title);
      }
    }

    const savedTarget = parseInt(localStorage.getItem('pb_target'), 10);
    if (savedTarget > 0) wordTarget = savedTarget;
    updateWordCount();

    // Pass save=false so setTheme doesn't close dropdown or re-write localStorage
    setTheme(localStorage.getItem('pb_theme') || 'paper', false);

    // 'pb_dark' is stored as the string "true" or "false"
    if (localStorage.getItem('pb_dark') === 'true') setDark(true);

    // Do an initial save to ensure a freshly-opened session has a record
    silentSave();
  } catch { /* corrupt localStorage — start fresh */ }
}

// ── Copy / Download ────────────────────────────────────
function collectText() {
  const parts = [];
  function collect(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      parts.push(node.textContent);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'HR') { parts.push('\n\n---\n\n'); return; }
      for (const child of node.childNodes) collect(child);
      if (BLOCK_TAGS.has(node.tagName)) parts.push('\n');
    }
  }
  collect(elEditor);
  return parts.join('').replace(/\n{3,}/g, '\n\n').trim();
}

function copyText() {
  const title = elPostTitle.value.trim();
  const body  = collectText();
  navigator.clipboard.writeText((title ? title + '\n\n' : '') + body)
    .then(() => showToast('Copied ✓'))
    .catch(() => showToast('Copy failed — try Cmd+A, Cmd+C'));
}

function downloadText() {
  const title    = elPostTitle.value.trim();
  const content  = (title ? title + '\n\n' : '') + collectText();
  const filename = (title || 'post').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.txt';
  const a        = document.createElement('a');
  a.href         = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
  a.download     = filename;
  a.click();
  // Delay revocation to give the browser time to initiate the download,
  // particularly in Firefox where immediate revocation can abort the transfer.
  setTimeout(() => URL.revokeObjectURL(a.href), 100);
  showToast('Downloaded ✓');
}

function showToast(msg) {
  elToast.textContent = msg;
  elToast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => elToast.classList.remove('show'), 2000);
}

// ── Slash command menu ─────────────────────────────────
function openSlashMenu() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  elSlashMenu.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
  elSlashMenu.style.left = (rect.left   + window.scrollX)     + 'px';
  slashActiveIndex = 0;
  updateSlashActive();
  elSlashMenu.classList.add('show');
  slashMenuOpen = true;
}

function closeSlashMenu() {
  elSlashMenu.classList.remove('show');
  slashMenuOpen = false;
}

function updateSlashActive() {
  // Scope to elSlashMenu to avoid querying the whole document on every arrow key
  elSlashMenu.querySelectorAll('.slash-item').forEach((el, i) => {
    el.classList.toggle('active', i === slashActiveIndex);
  });
}

function applySlashFormat(format) {
  closeSlashMenu();
  elEditor.focus();
  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    const node  = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE && range.startOffset > 0) {
      const del = document.createRange();
      del.setStart(node, range.startOffset - 1);
      del.setEnd(node, range.startOffset);
      sel.removeAllRanges(); sel.addRange(del);
      document.execCommand('delete');
    }
  }
  document.execCommand('formatBlock', false, format);
  onType();
}

// ── Mobile drawer ──────────────────────────────────────
function toggleMobileDrawer() {
  const isOpen = elMobileDrawer.classList.toggle('open');
  elBtnMobileMenu.setAttribute('aria-expanded', isOpen);
  elBtnMobileMenu.classList.toggle('on', isOpen);
}

function closeMobileDrawer() {
  elMobileDrawer.classList.remove('open');
  elBtnMobileMenu.setAttribute('aria-expanded', 'false');
  elBtnMobileMenu.classList.remove('on');
}

function updateDrawerDots(theme) {
  [elDrawerDotPaper, elDrawerDotSlate, elDrawerDotMeadow].forEach(el => el && el.classList.remove('active'));
  const map = { paper: elDrawerDotPaper, slate: elDrawerDotSlate, meadow: elDrawerDotMeadow };
  if (map[theme]) map[theme].classList.add('active');
}
</script>
