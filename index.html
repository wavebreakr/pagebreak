<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagebreak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --ink: #1c1b18;
    --ink-mid: #6b6860;
    --ink-dim: #b0ada6;
    --ink-faint: #e8e5df;
    --accent: #c2692a;
    --accent-dim: rgba(194,105,42,0.1);
    --panel-bg: #fdfcfa;
    --panel-border: #ede9e2;
    --link: #2a6aaa;
  }
  .dark {
    --bg: #141412;
    --surface: #1c1b18;
    --ink: #e8e4db;
    --ink-mid: #968f84;
    --ink-dim: #4a4740;
    --ink-faint: #2a2825;
    --panel-bg: #181714;
    --panel-border: #2a2825;
    --link: #5a9fd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); transition: background 0.4s; }
  body { font-family: 'DM Sans', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; overflow: hidden; }

  /* ── Chrome ── */
  .chrome {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: var(--bg); border-bottom: 1px solid var(--ink-faint);
    z-index: 100; transition: background 0.4s, border-color 0.4s;
    gap: 12px;
  }

  .chrome-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .brand {
    display: flex; align-items: center;
    flex-shrink: 0;
  }
  .brand img { height: 22px; width: auto; display: block; }
  .dark .brand img { filter: invert(1); }

  .post-title-inline {
    font-size: 13px; font-weight: 400;
    color: var(--ink-dim); background: none; border: none; outline: none;
    width: 220px; max-width: 30vw;
    transition: color 0.2s;
  }
  .post-title-inline::placeholder { color: var(--ink-dim); }
  .post-title-inline:focus { color: var(--ink-mid); }

  .chrome-sep { width: 1px; height: 16px; background: var(--ink-faint); flex-shrink: 0; }

  .chrome-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .word-count {
    font-size: 12px; font-weight: 500; color: var(--ink-dim);
    font-variant-numeric: tabular-nums; min-width: 54px; text-align: right;
  }
  #wordCount {
    cursor: pointer; border-radius: 4px;
    padding: 2px 4px; margin: -2px -4px;
    transition: background 0.15s;
  }
  #wordCount:hover { background: var(--ink-faint); color: var(--ink-mid); }

  .target-input {
    font-size: 12px; font-weight: 500; color: var(--ink-mid);
    font-variant-numeric: tabular-nums;
    width: 72px; text-align: right;
    background: var(--ink-faint); border: none; outline: none;
    border-radius: 4px; padding: 2px 5px;
    display: none;
  }
  .target-input.show { display: block; }

  .word-target-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    border-radius: 0 1px 1px 0;
  }
  .word-target-progress.done { background: #5a9e6f; }

  .icon-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--ink-faint); border-radius: 6px;
    background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink-mid);
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--ink-faint); color: var(--ink); }
  .icon-btn.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Copy button — text label style */
  .copy-btn {
    font-size: 11px; font-weight: 500;
    padding: 0 10px; height: 30px;
    border: 1px solid var(--ink-faint); border-radius: 6px;
    background: none; cursor: pointer; color: var(--ink-mid);
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s; white-space: nowrap; letter-spacing: 0.01em;
  }
  .copy-btn:hover { background: var(--ink-faint); color: var(--ink); }
  .copy-btn svg { width: 12px; height: 12px; stroke: currentColor; flex-shrink: 0; }

  .save-status {
    font-size: 11px; color: var(--ink-dim);
    opacity: 0; transition: opacity 0.4s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .save-status.show { opacity: 1; }

  /* ── Layout ── */
  .writing-area {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    display: flex; overflow: hidden;
  }

  /* ── Editor wrap ── */
  .editor-wrap {
    flex: 1; overflow-y: auto; padding: 52px 0 120px;
  }
  .editor-wrap::-webkit-scrollbar { width: 3px; }
  .editor-wrap::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

  .editor-inner { max-width: 640px; margin: 0 auto; padding: 0 36px; }

  /* ── contenteditable editor ── */
  .editor {
    font-family: 'Lora', serif;
    font-size: 18px; font-weight: 400; line-height: 1.9;
    color: var(--ink);
    outline: none; min-height: calc(100vh - 200px);
    caret-color: var(--accent);
    transition: color 0.3s; letter-spacing: 0.005em;
    word-break: break-word;
  }

  /* Empty placeholder */
  .editor:empty::before {
    content: attr(data-placeholder);
    color: var(--ink-dim); font-style: italic; pointer-events: none;
  }

  /* Paragraph spacing — browsers use both p and div in contenteditable */
  .editor p,
  .editor div {
    margin-bottom: 1.15em;
    min-height: 1em;
  }
  .editor p:last-child,
  .editor div:last-child { margin-bottom: 0; }

  /* Shift+Enter line breaks stay tight — no extra gap */
  .editor br { display: block; margin-bottom: 0; }

  /* Bullet points */
  .editor ul {
    padding-left: 1.4em;
    margin-bottom: 0.75em;
    list-style: disc;
  }
  .editor ul li { margin-bottom: 0.2em; line-height: 1.9; }
  /* Nested bullets */
  .editor ul ul { margin-bottom: 0; list-style: circle; }
  .editor ul ul ul { list-style: square; }

  /* Horizontal rule */
  .editor hr {
    border: none; border-top: 1px solid var(--ink-faint);
    margin: 1.5em 0; display: block;
  }

  /* URL links */
  .editor a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }
  .editor a:hover { opacity: 0.8; }

  /* Bold / italic handled by browser execCommand */
  .editor b, .editor strong { font-weight: 700; }
  .editor i, .editor em { font-style: italic; }

  /* Headings */
  .editor h1, .editor h2, .editor h3 {
    font-family: 'Lora', serif;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 0.5em;
    margin-top: 0.25em;
    letter-spacing: -0.02em;
  }
  .editor h1 { font-size: 2em; }
  .editor h2 { font-size: 1.5em; }
  .editor h3 { font-size: 1.2em; }

  /* ── Celebration ── */
  .celebration {
    position: fixed; top: 62px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--ink); color: var(--bg);
    font-size: 13px; font-weight: 500;
    padding: 8px 18px; border-radius: 20px;
    opacity: 0; pointer-events: none; z-index: 300;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap; letter-spacing: -0.01em;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .celebration.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    font-size: 12px; font-weight: 500; color: var(--ink-mid);
    background: var(--surface); border: 1px solid var(--ink-faint);
    border-radius: 7px; padding: 6px 12px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; }

  /* ── Posts sidebar ── */
  .posts-panel {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid var(--ink-faint);
    background: var(--panel-bg);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s, border-color 0.4s;
    order: -1;
  }
  .posts-panel.hidden { width: 0; opacity: 0; border-right-width: 0; }
  .posts-panel-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .posts-panel-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-dim);
  }
  .posts-list {
    flex: 1; overflow-y: auto;
    padding: 8px; display: flex; flex-direction: column; gap: 3px;
  }
  .posts-list::-webkit-scrollbar { width: 2px; }
  .posts-list::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }
  .post-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 7px;
    cursor: pointer; transition: all 0.15s;
  }
  .post-row:hover { background: var(--ink-faint); }
  .post-row.active { background: var(--accent-dim); }
  .post-row-info { flex: 1; min-width: 0; }
  .post-row-title {
    font-size: 12.5px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em; line-height: 1.3;
  }
  .post-row.active .post-row-title { color: var(--accent); }
  .post-row-meta { font-size: 10.5px; color: var(--ink-dim); margin-top: 2px; }
  .post-row-delete {
    width: 20px; height: 20px; border-radius: 4px;
    border: none; background: none; cursor: pointer;
    color: var(--ink-dim); font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.15s; flex-shrink: 0;
  }
  .post-row:hover .post-row-delete { opacity: 1; }
  .post-row-delete:hover { background: rgba(184,74,74,0.12); color: #b84a4a; }

  /* ── Slash command menu ── */
  .slash-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--panel-border);
    border-radius: 9px;
    padding: 5px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    z-index: 500;
    display: none;
    flex-direction: column;
    gap: 2px;
    min-width: 160px;
  }
  .slash-menu.show { display: flex; }
  .slash-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    cursor: pointer; transition: background 0.1s;
  }
  .slash-item:hover, .slash-item.active { background: var(--ink-faint); }
  .slash-item-icon {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    width: 22px; flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .slash-item-label { font-size: 12.5px; font-weight: 500; color: var(--ink); }

  @media (max-width: 700px) {
    .posts-panel { display: none; }
    .editor-inner { padding: 0 20px; }
    .post-title-inline { max-width: 120px; }
  }
</style>
</head>
<body>

<!-- Chrome -->
<div class="chrome">
  <div class="chrome-left">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/wavebreakr/pagebreak/main/PagebreakLogo2.png" alt="Pagebreak" />
    </div>
    <button class="icon-btn" id="btnPosts" title="All posts" onclick="togglePostsPanel()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
    <div class="chrome-sep"></div>
    <input class="post-title-inline" id="postTitleInline" type="text"
      placeholder="Untitled post…" maxlength="80" oninput="onTitleType()" />
  </div>
  <div class="chrome-right">
    <span class="save-status" id="saveStatus">Saved</span>
    <span class="word-count" id="wordCount" title="Click to set a word target" onclick="openTargetInput()">0 words</span>
    <input class="target-input" id="targetInput" type="number" min="1" max="99999"
      placeholder="Target…" title="Word target — press Enter to set, Escape to clear" />
    <span class="word-count" id="readingLevel" style="min-width:0" title="Estimated reading level (Flesch-Kincaid grade)"></span>
    <button class="copy-btn" title="Copy all text to clipboard" onclick="copyText()">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="4" width="9" height="11" rx="1.5"/>
        <path d="M11 4V3a1 1 0 0 0-1-1H3a1.5 1.5 0 0 0-1.5 1.5v8A1 1 0 0 0 3 12.5h2"/>
      </svg>
      Copy
    </button>
    <button class="copy-btn" title="Download as .txt" onclick="downloadText()">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3v7M5 7l3 3 3-3"/><path d="M3 12h10"/>
      </svg>
      Download
    </button>
    <button class="icon-btn" id="btnDark" title="Toggle dark mode" onclick="toggleDark()">🌙</button>
  </div>
  <div class="word-target-progress" id="wordTargetProgress"></div>
</div>

<!-- Writing area -->
<div class="writing-area">

  <!-- Posts sidebar -->
  <div class="posts-panel hidden" id="postsPanel">
    <div class="posts-panel-header">
      <div class="posts-panel-label">Posts</div>
      <button class="icon-btn" onclick="newPost()" title="New post" style="width:24px;height:24px;font-size:16px;border-radius:5px;">＋</button>
    </div>
    <div class="posts-list" id="postsList"></div>
  </div>

  <div class="editor-wrap">
    <div class="editor-inner">
      <div
        class="editor"
        id="editor"
        contenteditable="true"
        data-placeholder="Start writing…"
        spellcheck="true"
      ></div>
    </div>
  </div>

</div>

<!-- Celebration -->
<div class="celebration" id="celebration"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let isDark = false;
let wordTarget = 0;
let targetCelebrated = false; // tracks whether we've fired the celebration for the current target
let slashMenuOpen = false;
let slashActiveIndex = 0;
const SLASH_ITEMS = ['h1','h2','h3','p'];

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadDoc();
  setInterval(silentSave, 20000);

  const editor = document.getElementById('editor');

  // Global keyboard shortcuts (Cmd+S save — fires on document so it works everywhere)
  document.addEventListener('keydown', e => {
    const mod = e.metaKey || e.ctrlKey;
    if (mod && e.key === 's') { e.preventDefault(); silentSave(); }
  });

  // Force <p> on Enter (not <div>) for consistent paragraph spacing
  document.execCommand('defaultParagraphSeparator', false, 'p');

  editor.addEventListener('keydown', e => {
    const mod = e.metaKey || e.ctrlKey;
    const sel = window.getSelection();

    // ── Slash menu navigation ──────────────────────────
    if (slashMenuOpen) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        slashActiveIndex = (slashActiveIndex + 1) % SLASH_ITEMS.length;
        updateSlashActive(); return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        slashActiveIndex = (slashActiveIndex - 1 + SLASH_ITEMS.length) % SLASH_ITEMS.length;
        updateSlashActive(); return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        applySlashFormat(SLASH_ITEMS[slashActiveIndex]); return;
      }
      if (e.key === 'Escape') { e.preventDefault(); closeSlashMenu(); return; }
      if (e.key === 'Backspace') { closeSlashMenu(); /* fall through to delete */ }
      else { closeSlashMenu(); /* any other key — close and type normally */ }
    }

    // ── Cmd/Ctrl+B — bold ──────────────────────────────
    if (mod && e.key === 'b') {
      e.preventDefault();
      document.execCommand('bold');
      return;
    }

    // ── Cmd/Ctrl+I — italic ────────────────────────────
    if (mod && e.key === 'i') {
      e.preventDefault();
      document.execCommand('italic');
      return;
    }

    // ── Tab / Shift+Tab — indent/outdent bullets ───────
    if (e.key === 'Tab') {
      if (!sel || !sel.rangeCount) return;
      // Only intercept when inside a list item
      let node = sel.getRangeAt(0).startContainer;
      while (node && node !== editor) {
        if (node.nodeName === 'LI') {
          e.preventDefault();
          document.execCommand(e.shiftKey ? 'outdent' : 'indent');
          return;
        }
        node = node.parentNode;
      }
      // Outside a list — let Tab through (or prevent default to avoid focus jump)
      e.preventDefault();
      document.execCommand('insertText', false, '    ');
      return;
    }

    // ── Space — bullet auto-transform ("- " → <ul>) ───
    if (e.key === ' ') {
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (!range.collapsed) return;

      // Walk up to the nearest block-level ancestor inside the editor
      let block = range.startContainer;
      while (block && block !== editor && !/^(P|DIV|LI)$/.test(block.nodeName)) {
        block = block.parentNode;
      }
      if (!block || block === editor) return;

      const preRange = document.createRange();
      preRange.setStart(block, 0);
      preRange.setEnd(range.startContainer, range.startOffset);
      const textBefore = preRange.toString();

      if (textBefore === '-') {
        e.preventDefault();
        const delRange = document.createRange();
        delRange.setStart(range.startContainer, range.startOffset - 1);
        delRange.setEnd(range.startContainer, range.startOffset);
        sel.removeAllRanges();
        sel.addRange(delRange);
        document.execCommand('delete');
        document.execCommand('insertUnorderedList');
        onType();
        return;
      }
      // Also linkify any URL immediately before the cursor
      linkifyAtCursor();
      return;
    }

    // ── Enter — hr transform ("-----" on empty line → <hr>) and linkify ──
    if (e.key === 'Enter') {
      // Check if the current block contains exactly "-----"
      const rangeCk = sel && sel.rangeCount ? sel.getRangeAt(0) : null;
      if (rangeCk && rangeCk.collapsed) {
        let block = rangeCk.startContainer;
        while (block && block !== editor && !/^(P|DIV|LI)$/.test(block.nodeName)) {
          block = block.parentNode;
        }
        if (block && block !== editor && block.textContent.trim() === '-----') {
          e.preventDefault();
          // Select all content in the block and replace with <hr>
          const blockRange = document.createRange();
          blockRange.selectNodeContents(block);
          sel.removeAllRanges();
          sel.addRange(blockRange);
          // Insert an hr followed by an empty paragraph so cursor has somewhere to land
          document.execCommand('insertHTML', false, '<hr><p><br></p>');
          onType();
          return;
        }
      }
      setTimeout(linkifyAtCursor, 0);
    }
  });

  // Strip formatting on paste — insert plain text only
  editor.addEventListener('paste', e => {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // Word target input
  const targetInput = document.getElementById('targetInput');
  targetInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commitTarget(); }
    if (e.key === 'Escape') { e.preventDefault(); clearTarget(); }
  });
  targetInput.addEventListener('blur', () => {
    // Only commit on blur if the input is still visible (i.e. Escape didn't just close it)
    if (targetInput.classList.contains('show')) commitTarget();
  });

  editor.addEventListener('keyup', onType);
  editor.addEventListener('input', () => {
    onType();
    // Slash command detection — open menu when '/' is the only character in the block
    if (slashMenuOpen) return;
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return;
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE) return;
    let block = node;
    while (block && block !== editor && !/^(P|DIV|H[1-3])$/.test(block.nodeName)) {
      block = block.parentNode;
    }
    if (!block || block === editor) return;
    if (block.textContent.trim() === '/') openSlashMenu();
  });

  document.addEventListener('mousedown', e => {
    if (slashMenuOpen && !document.getElementById('slashMenu').contains(e.target)) {
      closeSlashMenu();
    }
  });
});
// ══════════════════════════════════
// URL LINKIFICATION
// Scans the text node immediately before the cursor and wraps any trailing
// URL in an <a> tag using execCommand so it lands in the undo stack.
// ══════════════════════════════════
const URL_RE = /https?:\/\/[^\s<>"']+[^\s<>"'.,:;!?')\]]/;

function linkifyAtCursor() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed) return;

  let textNode = range.startContainer;
  if (textNode.nodeType !== Node.TEXT_NODE) return;

  const text = textNode.textContent.slice(0, range.startOffset);
  const match = URL_RE.exec(text);
  if (!match) return;

  // Match must run right up to the cursor
  if (match.index + match[0].length !== text.length) return;

  // Don't re-linkify if already inside an <a>
  const editor = document.getElementById('editor');
  let parent = textNode.parentNode;
  while (parent && parent !== editor) {
    if (parent.tagName === 'A') return;
    parent = parent.parentNode;
  }

  const url = match[0];
  const linkRange = document.createRange();
  linkRange.setStart(textNode, match.index);
  linkRange.setEnd(textNode, match.index + url.length);
  sel.removeAllRanges();
  sel.addRange(linkRange);

  document.execCommand('createLink', false, url);

  // Restore cursor to after the link
  const newSel = window.getSelection();
  if (newSel && newSel.rangeCount) newSel.getRangeAt(0).collapse(false);
}

// ══════════════════════════════════
// WORD COUNT + TARGET CELEBRATION
// ══════════════════════════════════
function onType() {
  updateWordCount();
  clearTimeout(onType._t);
  onType._t = setTimeout(silentSave, 5000);
}

function getEditorText() {
  // Walk DOM text nodes — avoids innerText inflating counts with hidden whitespace
  const editor = document.getElementById('editor');
  const parts = [];
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      parts.push(node.textContent);
    } else {
      // Insert a space at block boundaries so words don't merge across paragraphs
      const isBlock = node.nodeType === Node.ELEMENT_NODE &&
        /^(P|DIV|LI|BR|UL|OL)$/.test(node.tagName);
      if (isBlock) parts.push(' ');
      for (const child of node.childNodes) walk(child);
      if (isBlock) parts.push(' ');
    }
  }
  walk(editor);
  return parts.join('');
}

// ══════════════════════════════════
// READING LEVEL (Flesch-Kincaid Grade)
// ══════════════════════════════════
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  // Strip silent trailing e
  word = word.replace(/e$/, '');
  const vowelGroups = word.match(/[aeiouy]+/g);
  return vowelGroups ? Math.max(1, vowelGroups.length) : 1;
}

function getReadingLevel(rawText) {
  const text = rawText.replace(/\s+/g, ' ').trim();
  if (!text) return '';

  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  const numSentences = sentences.length;
  if (numSentences === 0) return '';

  const words = text.split(/\s+/).filter(w => w.replace(/[^a-zA-Z]/g, '').length > 0);
  const numWords = words.length;
  if (numWords < 10) return '';

  const numSyllables = words.reduce((sum, w) => sum + countSyllables(w), 0);

  // Flesch-Kincaid Grade Level
  const grade = 0.39 * (numWords / numSentences) + 11.8 * (numSyllables / numWords) - 15.59;
  const g = Math.max(1, Math.round(grade));
  return '· Grade ' + Math.min(g, 16) + (g > 16 ? '+' : '');
}

function updateWordCount() {
  const rawText = getEditorText();
  const trimmed = rawText.trim();
  const words = trimmed ? trimmed.split(/\s+/).filter(w => w.length > 0).length : 0;
  const label = wordTarget
    ? words + ' / ' + wordTarget + ' word' + (wordTarget !== 1 ? 's' : '')
    : words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('wordCount').textContent = label;
  document.getElementById('readingLevel').textContent = getReadingLevel(rawText);
  updateTargetProgress(words);

  // Celebrate only when the word target is hit exactly for the first time
  if (wordTarget > 0 && words === wordTarget && !targetCelebrated) {
    targetCelebrated = true;
    celebrate(words + ' words — target reached! ✦');
  }
  // Reset the flag if they drop back below the target (so hitting it again re-fires)
  if (wordTarget > 0 && words < wordTarget) {
    targetCelebrated = false;
  }
}

function openTargetInput() {
  const input = document.getElementById('targetInput');
  input.value = wordTarget || '';
  input.classList.add('show');
  document.getElementById('wordCount').style.display = 'none';
  input.focus();
  input.select();
}

function commitTarget() {
  const input = document.getElementById('targetInput');
  const val = parseInt(input.value, 10);
  wordTarget = (val > 0) ? val : 0;
  // Reset celebration state whenever the target changes
  targetCelebrated = false;
  if (wordTarget) localStorage.setItem('pb_target', wordTarget);
  else localStorage.removeItem('pb_target');
  closeTargetInput();
  updateWordCount();
}

function clearTarget() {
  wordTarget = 0;
  targetCelebrated = false;
  localStorage.removeItem('pb_target');
  closeTargetInput();
  updateWordCount();
}

function closeTargetInput() {
  document.getElementById('targetInput').classList.remove('show');
  document.getElementById('wordCount').style.display = '';
}

function updateTargetProgress(words) {
  const bar = document.getElementById('wordTargetProgress');
  if (!wordTarget) { bar.style.width = '0%'; return; }
  const pct = Math.min(words / wordTarget * 100, 100);
  bar.style.width = pct + '%';
  bar.classList.toggle('done', words >= wordTarget);
}

function celebrate(msg) {
  const el = document.getElementById('celebration');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(celebrate._t);
  celebrate._t = setTimeout(() => el.classList.remove('show'), 2600);
}

function onTitleType() {
  const title = document.getElementById('postTitleInline').value.trim();
  document.title = title ? title + ' — Pagebreak' : 'Pagebreak';
  const panel = document.getElementById('postsPanel');
  if (!panel.classList.contains('hidden')) renderPostsList();
  onType();
}

// ══════════════════════════════════
// POSTS MANAGEMENT
// ══════════════════════════════════
function genId() { return 'pb_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function getAllPostIds() { try { return JSON.parse(localStorage.getItem('pb_posts') || '[]'); } catch(e) { return []; } }
function saveAllPostIds(ids) { localStorage.setItem('pb_posts', JSON.stringify(ids)); }
function getActiveId() { return localStorage.getItem('pb_active') || null; }
function setActiveId(id) { localStorage.setItem('pb_active', id); }
function getPost(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch(e) { return null; } }
function savePost(id, data) { localStorage.setItem(id, JSON.stringify(data)); }
function deletePost(id) {
  localStorage.removeItem(id);
  saveAllPostIds(getAllPostIds().filter(i => i !== id));
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function togglePostsPanel() {
  const panel = document.getElementById('postsPanel');
  const isHidden = panel.classList.contains('hidden');
  if (isHidden) { silentSave(); renderPostsList(); }
  panel.classList.toggle('hidden', !isHidden);
  document.getElementById('btnPosts').classList.toggle('on', isHidden);
}

function renderPostsList() {
  const ids = getAllPostIds();
  const activeId = getActiveId();
  const list = document.getElementById('postsList');
  if (ids.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--ink-dim);padding:8px 2px;">No posts yet.</div>';
    return;
  }
  list.innerHTML = ids.slice().reverse().map(id => {
    const post = getPost(id);
    if (!post) return '';
    const title = post.title || 'Untitled post';
    const words = post.body ? post.body.replace(/<[^>]+>/g,' ').split(/\s+/).filter(w=>w).length : 0;
    const date = post.saved ? new Date(post.saved).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
    return `
      <div class="post-row${id===activeId?' active':''}" data-post-id="${id}" onclick="openPost('${id}')">
        <div class="post-row-info">
          <div class="post-row-title">${escHtml(title)}</div>
          <div class="post-row-meta">${words} word${words!==1?'s':''} · ${date}</div>
        </div>
        <button class="post-row-delete" title="Delete" onclick="event.stopPropagation();confirmDeletePost('${id}')">×</button>
      </div>`;
  }).join('');
}

function openPost(id) {
  silentSave();
  setActiveId(id);
  const post = getPost(id);
  if (post) {
    document.getElementById('postTitleInline').value = post.title || '';
    document.getElementById('editor').innerHTML = sanitizeBody(post.body || '');
    document.title = (post.title||'').trim() ? post.title.trim() + ' — Pagebreak' : 'Pagebreak';
    targetCelebrated = false;
    updateWordCount();
  }
  renderPostsList();
  document.getElementById('editor').focus();
}

function newPost() {
  silentSave();
  const id = genId();
  try {
    saveAllPostIds([...getAllPostIds(), id]);
    savePost(id, { title:'', body:'', saved: Date.now() });
  } catch(e) {
    showSaveStatus('⚠ Save failed', true);
    return;
  }
  setActiveId(id);
  document.getElementById('postTitleInline').value = '';
  document.getElementById('editor').innerHTML = '';
  document.title = 'Pagebreak';
  targetCelebrated = false;
  updateWordCount();
  renderPostsList();
  document.getElementById('editor').focus();
}

function confirmDeletePost(id) {
  const targetRow = document.querySelector(`.post-row[data-post-id="${id}"]`);
  if (!targetRow) return;
  const post = getPost(id);
  const name = post?.title || 'Untitled post';
  targetRow.innerHTML = `
    <div class="post-row-info" style="min-width:0">
      <div class="post-row-title" style="color:#b84a4a;font-size:11px">Delete "${escHtml(name)}"?</div>
      <div class="post-row-meta">This can't be undone</div>
    </div>
    <button onclick="event.stopPropagation();doDeletePost('${id}')"
      style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:rgba(184,74,74,0.15);color:#b84a4a;cursor:pointer;flex-shrink:0;">Yes</button>
    <button onclick="event.stopPropagation();renderPostsList()"
      style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:none;
             background:var(--ink-faint);color:var(--ink-mid);cursor:pointer;flex-shrink:0;">No</button>
  `;
}

function doDeletePost(id) {
  const activeId = getActiveId();
  deletePost(id);
  if (id === activeId) {
    const ids = getAllPostIds();
    ids.length > 0 ? openPost(ids[ids.length - 1]) : newPost();
    return;
  }
  renderPostsList();
}

// ══════════════════════════════════
// TOGGLES
// ══════════════════════════════════
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('btnDark').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('btnDark').classList.toggle('on', isDark);
  localStorage.setItem('pb_dark', isDark);
}

// ══════════════════════════════════
// SAVE / LOAD / COPY
// ══════════════════════════════════

// Strip inline color/background styles injected by the browser's contenteditable
// so saved HTML always defers to CSS variables and renders correctly in both modes.
function sanitizeBody(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty('color');
    el.style.removeProperty('background-color');
    el.style.removeProperty('background');
    if (!el.getAttribute('style').trim()) el.removeAttribute('style');
  });
  return tmp.innerHTML;
}

function silentSave() {
  let id = getActiveId();
  try {
    if (!id) {
      id = genId();
      saveAllPostIds([...getAllPostIds(), id]);
      setActiveId(id);
    }
    savePost(id, {
      title: document.getElementById('postTitleInline').value,
      body:  sanitizeBody(document.getElementById('editor').innerHTML),
      saved: Date.now(),
    });
    showSaveStatus('Saved');
  } catch(e) {
    showSaveStatus('⚠ Save failed', true);
  }
  const panel = document.getElementById('postsPanel');
  if (!panel.classList.contains('hidden')) renderPostsList();
}

function showSaveStatus(msg, isError) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.style.color = isError ? '#b84a4a' : '';
  el.classList.add('show');
  clearTimeout(showSaveStatus._t);
  showSaveStatus._t = setTimeout(() => el.classList.remove('show'), isError ? 4000 : 2000);
}

function loadDoc() {
  try {
    const ids = getAllPostIds();
    // Migrate legacy single-doc save (pb_v4) into the multi-post system
    const legacy = localStorage.getItem('pb_v4');
    if (legacy && ids.length === 0) {
      const d = JSON.parse(legacy);
      const id = genId();
      saveAllPostIds([id]);
      setActiveId(id);
      savePost(id, { title: d.title||'', body: d.body||'', saved: Date.now() });
      localStorage.removeItem('pb_v4');
      document.getElementById('postTitleInline').value = d.title || '';
      document.getElementById('editor').innerHTML = sanitizeBody(d.body || '');
      document.title = (d.title||'').trim() ? d.title.trim() + ' — Pagebreak' : 'Pagebreak';
    } else {
      let activeId = getActiveId();
      if (!activeId && ids.length > 0) { activeId = ids[ids.length - 1]; setActiveId(activeId); }
      if (activeId) {
        const post = getPost(activeId);
        if (post) {
          document.getElementById('postTitleInline').value = post.title || '';
          document.getElementById('editor').innerHTML = sanitizeBody(post.body || '');
          document.title = (post.title||'').trim() ? post.title.trim() + ' — Pagebreak' : 'Pagebreak';
        }
      }
    }
    const savedTarget = parseInt(localStorage.getItem('pb_target'), 10);
    if (savedTarget > 0) wordTarget = savedTarget;
    updateWordCount();
    if (localStorage.getItem('pb_dark') === 'true') { isDark = false; toggleDark(); }
  } catch(e) {}
}

// Shared plain-text extractor used by copy and download
function collectText() {
  const editor = document.getElementById('editor');
  const parts = [];
  function collect(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      parts.push(node.textContent);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      const tag = node.tagName;
      if (tag === 'HR') { parts.push('\n\n---\n\n'); return; }
      const isBlock = ['P','DIV','LI','BR','H1','H2','H3'].includes(tag);
      for (const child of node.childNodes) collect(child);
      if (isBlock) parts.push('\n');
    }
  }
  collect(editor);
  return parts.join('').replace(/\n{3,}/g, '\n\n').trim();
}

function copyText() {
  const title = document.getElementById('postTitleInline').value.trim();
  const body = collectText();
  navigator.clipboard.writeText((title ? title + '\n\n' : '') + body)
    .then(() => showToast('Copied ✓'))
    .catch(() => showToast('Copy failed — try Cmd+A, Cmd+C'));
}

function downloadText() {
  const title = document.getElementById('postTitleInline').value.trim();
  const body = collectText();
  const content = (title ? title + '\n\n' : '') + body;
  const filename = (title || 'post').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.txt';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2000);
}
// ══════════════════════════════════
// SLASH COMMAND MENU
// ══════════════════════════════════
function openSlashMenu() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  const menu = document.getElementById('slashMenu');

  // Position just below the cursor
  const top = rect.bottom + window.scrollY + 4;
  const left = rect.left + window.scrollX;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  slashActiveIndex = 0;
  updateSlashActive();
  menu.classList.add('show');
  slashMenuOpen = true;
}

function closeSlashMenu() {
  document.getElementById('slashMenu').classList.remove('show');
  slashMenuOpen = false;
}

function updateSlashActive() {
  document.querySelectorAll('.slash-item').forEach((el, i) => {
    el.classList.toggle('active', i === slashActiveIndex);
  });
}

function applySlashFormat(format) {
  closeSlashMenu();
  const editor = document.getElementById('editor');
  editor.focus();

  // Delete the triggering slash character
  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    // Move back one character to select the '/'
    const delRange = document.createRange();
    const node = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE && range.startOffset > 0) {
      delRange.setStart(node, range.startOffset - 1);
      delRange.setEnd(node, range.startOffset);
      sel.removeAllRanges();
      sel.addRange(delRange);
      document.execCommand('delete');
    }
  }

  // Apply the block format
  document.execCommand('formatBlock', false, format);
  onType();
}

</script>

  <div class="slash-item" onclick="applySlashFormat('h2')">

  <div class="slash-item" onclick="applySlashFormat('h3')">

  </div>

  </div>
</div>
